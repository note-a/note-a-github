<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <rect width="200" height="300" fill="#1a1a1a"/>
  <!-- Yellow object with shadow -->
  <defs>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:1" />
    </linearGradient>
  </defs>
  <polygon points="180,50 180,250 50,300 50,100" fill="url(#yellowGrad)" opacity="0.9"/>
  <!-- Detail lines -->
  <line x1="100" y1="100" x2="120" y2="200" stroke="#ffcc00" stroke-width="2" opacity="0.7"/>
  <line x1="140" y1="120" x2="160" y2="220" stroke="#ffcc00" stroke-width="2" opacity="0.7"/>
  <!-- Shadow effect -->
  <polygon points="180,250 50,300 45,310 175,260" fill="#000000" opacity="0.4"/>
  <text x="10" y="280" font-family="monospace" font-size="11" fill="#ffff00">[SHADOW_DETAIL]</text>
</svg>
