    // Initialize content display
    function loadContent(section) {
      const content = contents[section];
      const terminalContent = document.getElementById('terminalContent');

      if (content) {
        if (content.isBoard) {
          // Board format
          const boardHTML = `
            <div class="board-container">
              ${content.items.map((item, idx) => `
                <div class="board-item" data-index="${idx}">
                  <div class="board-item-title">[${idx + 1}] ${item.title}</div>
                  <div class="board-item-meta">
                    <span class="board-item-author">Author: ${item.author}</span>
                    <span class="board-item-year">Year: ${item.year}</span>
                    <span class="board-item-category">Category: ${item.category}</span>
                  </div>
                  <div class="board-item-preview">${item.preview}</div>
                </div>
              `).join('')}
            </div>
          `;
          terminalContent.innerHTML = boardHTML;

          // Position items randomly after a brief delay to ensure DOM is ready
          setTimeout(() => positionBoardItems(), 50);
        } else {
          // Regular text format
          const contentText = document.getElementById('contentText');
          contentText.textContent = content.text;
        }
      }
    }

    // Position board items randomly without overlapping
    function positionBoardItems() {
      const boardItems = document.querySelectorAll('.board-item');
      const container = document.querySelector('.board-container');

      if (!container) return;

      const containerWidth = container.offsetWidth;
      const containerHeight = container.offsetHeight;
      const positions = [];
      const padding = 15; // Space between items
      const maxAttempts = 50;

      boardItems.forEach((item, index) => {
        const itemWidth = item.offsetWidth || 240;
        const itemHeight = item.offsetHeight || 140;

        let placed = false;
        let attempts = 0;

        // Try to find a non-overlapping position
        while (!placed && attempts < maxAttempts) {
          const randomX = Math.random() * (containerWidth - itemWidth - 40) + 20;
          const randomY = Math.random() * (containerHeight - itemHeight - 40) + 20;

          // Check if this position overlaps with existing items
          let overlaps = false;
          for (let pos of positions) {
            const distX = Math.abs((randomX + itemWidth / 2) - (pos.x + pos.width / 2));
            const distY = Math.abs((randomY + itemHeight / 2) - (pos.y + pos.height / 2));
            const minDistX = (itemWidth + pos.width) / 2 + padding;
            const minDistY = (itemHeight + pos.height) / 2 + padding;

            if (distX < minDistX && distY < minDistY) {
              overlaps = true;
              break;
            }
          }

          if (!overlaps) {
            // Position found, apply styles
            const randomRotation = (Math.random() - 0.5) * 6;
            const randomScale = 0.97 + Math.random() * 0.06;
            const randomDelay = index * 30;

            item.style.left = randomX + 'px';
            item.style.top = randomY + 'px';
            item.style.transform = `rotate(${randomRotation}deg) scale(${randomScale})`;
            item.style.transition = `all 0.3s ease ${randomDelay}ms`;
            item.style.opacity = '0';

            // Trigger animation
            setTimeout(() => {
              item.style.opacity = '1';
            }, 10);

            positions.push({
              x: randomX,
              y: randomY,
              width: itemWidth,
              height: itemHeight
            });

            placed = true;
          }

          attempts++;
        }

        // Fallback if can't find space
        if (!placed) {
          const fallbackX = (index % 3) * 280 + 20;
          const fallbackY = Math.floor(index / 3) * 180 + 20;
          const randomRotation = (Math.random() - 0.5) * 4;

          item.style.left = fallbackX + 'px';
          item.style.top = fallbackY + 'px';
          item.style.transform = `rotate(${randomRotation}deg) scale(0.98)`;
        }
      });
    }

    // Menu item click handler
    function setupMenuItems() {
      const menuItems = document.querySelectorAll('.menu-item');

      menuItems.forEach(item => {
        item.addEventListener('click', function() {
          // Update active state
          menuItems.forEach(m => m.classList.remove('active'));
          this.classList.add('active');

          // Load content
          const section = this.getAttribute('data-section');
          loadContent(section);

          // Close menu on mobile
          const menuSection = document.getElementById('menuSection');
          if (window.innerWidth <= 768) {
            menuSection.classList.remove('mobile-active');
          }
        });
      });
    }

    // Hamburger menu toggle
    function setupHamburger() {
      const hamburgerBtn = document.getElementById('hamburgerBtn');
      const menuSection = document.getElementById('menuSection');

      hamburgerBtn.addEventListener('click', function() {
        menuSection.classList.toggle('mobile-active');
      });

      // Close menu on outside click
      document.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
          if (!menuSection.contains(e.target) && !hamburgerBtn.contains(e.target)) {
            menuSection.classList.remove('mobile-active');
          }
        }
      });

      // Close menu on ESC key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          menuSection.classList.remove('mobile-active');
        }
      });
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      setupMenuItems();
      setupHamburger();

      // Load initial content
      loadContent('project');
    });
