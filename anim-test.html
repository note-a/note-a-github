<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIM TEST</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#000; color:#39dc00; font-family:'Courier New',monospace; height:100%; }

.selector {
  display:flex; gap:8px; padding:12px 16px;
  border-bottom:1px solid #39dc00;
  overflow-x:auto;
}
.sel-btn {
  background:#000; border:1px solid #39dc00; color:#39dc00;
  font-family:'Courier New',monospace; font-size:10px;
  padding:5px 12px; cursor:pointer; white-space:nowrap;
  letter-spacing:1px; transition:all 0.1s;
}
.sel-btn:hover, .sel-btn.active {
  background:#39dc00; color:#000;
}

.preview {
  width:100%; height:160px;
  border-bottom:1px solid #39dc00;
}
canvas { display:block; width:100%; height:100%; }

.menu-mock {
  max-width:700px; margin:20px auto;
  border-top:2px solid #7fff4f;
  border-left:2px solid #7fff4f;
  border-bottom:2px solid #1a5500;
  border-right:2px solid #1a5500;
}
.mock-title {
  background:#39dc00; color:#000;
  padding:6px 12px; font-size:12px; font-weight:bold;
  display:flex; justify-content:space-between;
}
.mock-path { padding:6px 12px; font-size:11px; border-bottom:1px solid #39dc00; }
.mock-items {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px;
}
.mock-item {
  border-top:2px solid #7fff4f; border-left:2px solid #7fff4f;
  border-bottom:2px solid #1a5500; border-right:2px solid #1a5500;
  padding:16px; text-align:center; font-size:12px;
}
.mock-status {
  padding:6px 12px; border-top:1px solid #39dc00;
  font-size:10px; display:flex; justify-content:space-between;
}
</style>
</head>
<body>

<div class="selector">
  <button class="sel-btn active" onclick="switchAnim('life')">A. GAME OF LIFE</button>
  <button class="sel-btn" onclick="switchAnim('radar')">B. RADAR</button>
  <button class="sel-btn" onclick="switchAnim('warp')">C. WARP</button>
  <button class="sel-btn" onclick="switchAnim('snake')">D. SNAKE</button>
  <button class="sel-btn" onclick="switchAnim('osc')">E. OSCILLOSCOPE</button>
  <button class="sel-btn" onclick="switchAnim('decode')">F. DECODE</button>
</div>

<div class="preview">
  <canvas id="animCanvas"></canvas>
</div>

<div class="menu-mock">
  <div class="mock-title">SET WORLD DIRECTORY <span>_ □ ✕</span></div>
  <div class="mock-path">C:\WORLD\SET\</div>
  <div class="mock-items">
    <div class="mock-item">SET</div>
    <div class="mock-item">SET Inclusion</div>
    <div class="mock-item">entire</div>
    <div class="mock-item">log</div>
    <div class="mock-item">reference</div>
    <div class="mock-item">Archive</div>
  </div>
  <div class="mock-status"><span>6 Files</span><span>ENTER to select</span></div>
</div>

<script>
const canvas = document.getElementById('animCanvas');
const ctx = canvas.getContext('2d');
let W, H, currentAnim = 'life', animInterval = null;

function resize() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width  = Math.floor(rect.width);
  H = canvas.height = Math.floor(rect.height);
}
resize();
window.addEventListener('resize', () => { resize(); initAnim(currentAnim); });

// ─────────────────────────────────────────────────────────────
// A. CONWAY'S GAME OF LIFE
// ─────────────────────────────────────────────────────────────
let lifeGrid, lifeCols, lifeRows;
const CELL = 7;

function initLife() {
  lifeCols = Math.floor(W / CELL);
  lifeRows = Math.floor(H / CELL);
  lifeGrid = Array.from({length: lifeRows}, () =>
    Array.from({length: lifeCols}, () => Math.random() > 0.72 ? 1 : 0)
  );
}

function stepLife() {
  const next = Array.from({length: lifeRows}, () => new Array(lifeCols).fill(0));
  for (let r = 0; r < lifeRows; r++) {
    for (let c = 0; c < lifeCols; c++) {
      let n = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          if (dr===0 && dc===0) continue;
          const nr = (r+dr+lifeRows)%lifeRows, nc = (c+dc+lifeCols)%lifeCols;
          n += lifeGrid[nr][nc];
        }
      const alive = lifeGrid[r][c];
      next[r][c] = (alive && (n===2||n===3)) || (!alive && n===3) ? 1 : 0;
    }
  }
  lifeGrid = next;
}

let lifeAge = [];
function drawLife() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  stepLife();
  for (let r = 0; r < lifeRows; r++) {
    for (let c = 0; c < lifeCols; c++) {
      if (lifeGrid[r][c]) {
        const bright = 0.4 + Math.random() * 0.6;
        ctx.fillStyle = `rgba(57,220,0,${bright})`;
        ctx.fillRect(c*CELL+1, r*CELL+1, CELL-2, CELL-2);
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────
// B. RADAR (ENHANCED)
// ─────────────────────────────────────────────────────────────
let radarAngle = 0, radarTick = 0;
let radarBlips = [], radarInterference = 0;

function initRadar() {
  radarAngle = 0; radarTick = 0; radarInterference = 0;
  radarBlips = [
    { angle:0.52,  dist:0.55, label:'TGT-01', locked:true,  life:0, maxLife:140, vx:0.002,  vy:0.001  },
    { angle:1.80,  dist:0.38, label:'TGT-02', locked:false, life:0, maxLife:110, vx:-0.001, vy:0.002  },
    { angle:3.40,  dist:0.70, label:'OBJ-A',  locked:false, life:0, maxLife:90,  vx:0.003,  vy:-0.001 },
    { angle:4.90,  dist:0.28, label:'TGT-03', locked:false, life:0, maxLife:120, vx:-0.002, vy:-0.002 },
    { angle:5.60,  dist:0.62, label:'UNK',    locked:false, life:0, maxLife:80,  vx:0.001,  vy:0.003  },
    { angle:2.30,  dist:0.82, label:'OBJ-B',  locked:false, life:0, maxLife:100, vx:-0.003, vy:0.001  },
    { angle:0.90,  dist:0.15, label:'TGT-04', locked:false, life:0, maxLife:95,  vx:0.002,  vy:-0.003 },
  ];
}

function drawRadar() {
  radarTick++;
  ctx.fillStyle = 'rgba(0,0,0,0.14)';
  ctx.fillRect(0, 0, W, H);

  const cx = W/2, cy = H/2;
  const R  = Math.min(W, H) * 0.40;

  // 동심원 + 거리 라벨
  ctx.font = '7px Courier New';
  [0.33, 0.66, 1].forEach((s, i) => {
    ctx.strokeStyle = `rgba(57,220,0,${0.12 + i*0.04})`;
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.arc(cx, cy, R*s, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(57,220,0,0.35)';
    ctx.fillText(`${Math.round(s*100)}km`, cx+R*s+2, cy-2);
  });

  // 십자선 + 대각선
  ctx.strokeStyle = 'rgba(57,220,0,0.1)'; ctx.lineWidth = 0.5;
  [0, Math.PI/4, Math.PI/2, Math.PI*3/4].forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*R, cy + Math.sin(a)*R);
    ctx.lineTo(cx - Math.cos(a)*R, cy - Math.sin(a)*R);
    ctx.stroke();
  });

  // 스윕 꼬리
  const TAIL = Math.PI / 3.5;
  for (let i = 0; i < 40; i++) {
    const a = radarAngle - (i/40)*TAIL;
    const alpha = Math.pow(1 - i/40, 1.5) * 0.5;
    ctx.strokeStyle = `rgba(57,220,0,${alpha})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a)*R, cy + Math.sin(a)*R);
    ctx.stroke();
  }
  // 스윕 헤드
  ctx.strokeStyle = '#7fff7f'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(radarAngle)*R, cy + Math.sin(radarAngle)*R);
  ctx.stroke();

  // 블립 업데이트 + 드로우
  radarBlips.forEach(b => {
    // 느리게 이동
    b.angle += b.vx; b.dist += b.vy;
    if (b.dist < 0.1 || b.dist > 0.95) b.vy *= -1;

    // 스윕 감지
    const da = ((radarAngle - b.angle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    if (da < 0.07 || da > Math.PI*2 - 0.07) b.life = b.maxLife;

    if (b.life <= 0) return;
    const alpha = b.life / b.maxLife;
    const bx = cx + Math.cos(b.angle) * R * b.dist;
    const by = cy + Math.sin(b.angle) * R * b.dist;

    if (b.locked) {
      // 락온: 깜빡이는 다이아몬드 + 펄스링
      const pulse = Math.sin(radarTick * 0.15) * 0.5 + 0.5;
      ctx.strokeStyle = `rgba(100,255,100,${alpha * pulse})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(bx, by, 6 + pulse*4, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = `rgba(100,255,100,${alpha})`;
      ctx.lineWidth = 1.2;
      const d = 4;
      ctx.beginPath();
      ctx.moveTo(bx, by-d); ctx.lineTo(bx+d, by);
      ctx.lineTo(bx, by+d); ctx.lineTo(bx-d, by);
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle = `rgba(57,220,0,${alpha * 0.8})`;
      ctx.font = '7px Courier New';
      ctx.fillText('⟨LOCKED⟩', bx+8, by-4);
      ctx.fillText(b.label, bx+8, by+6);
    } else {
      ctx.fillStyle = `rgba(100,255,100,${alpha * 0.85})`;
      ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(57,220,0,${alpha * 0.5})`;
      ctx.font = '7px Courier New';
      ctx.fillText(b.label, bx+5, by-3);
    }
    b.life--;
  });

  // 인터퍼런스 (가끔 노이즈 선)
  if (Math.random() < 0.04) radarInterference = 8;
  if (radarInterference > 0) {
    for (let i = 0; i < 3; i++) {
      const iy = Math.random() * H;
      ctx.fillStyle = `rgba(57,220,0,${Math.random()*0.3})`;
      ctx.fillRect(0, iy, W, 1);
    }
    radarInterference--;
  }

  // NSEW
  ctx.fillStyle = 'rgba(57,220,0,0.5)'; ctx.font = 'bold 8px Courier New';
  ctx.fillText('N', cx-3, cy-R-5);
  ctx.fillText('S', cx-3, cy+R+12);
  ctx.fillText('E', cx+R+5, cy+3);
  ctx.fillText('W', cx-R-11, cy+3);

  // 좌측 상단 데이터 패널
  const brg = ((radarAngle * 180 / Math.PI) % 360 + 360) % 360;
  ctx.fillStyle = 'rgba(57,220,0,0.6)'; ctx.font = '8px Courier New';
  ctx.fillText(`BRG: ${brg.toFixed(1).padStart(6)}°`, 8, 16);
  ctx.fillText(`RNG: ${(R*0.01).toFixed(1)}km`, 8, 27);
  ctx.fillText(`TGT: ${radarBlips.filter(b=>b.life>0).length}`, 8, 38);

  // 우측 상단
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  ctx.textAlign = 'right';
  ctx.fillText(ts, W-8, 16);
  ctx.fillText('SYS ACTIVE', W-8, 27);
  ctx.textAlign = 'left';

  radarAngle += 0.035;
}

// ─────────────────────────────────────────────────────────────
// C. STARFIELD WARP
// ─────────────────────────────────────────────────────────────
let stars = [];
function initWarp() {
  stars = Array.from({length: 180}, () => newStar());
}
function newStar() {
  return {
    x: (Math.random()-0.5)*2, y: (Math.random()-0.5)*2,
    z: Math.random(), pz: 0,
  };
}
function drawWarp() {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, W, H);
  const cx = W/2, cy = H/2;
  stars.forEach(s => {
    s.pz = s.z;
    s.z -= 0.018;
    if (s.z <= 0) { Object.assign(s, newStar()); s.z = 1; s.pz = 1; return; }
    const sx  = (s.x  / s.z)  * W/2 + cx;
    const sy  = (s.y  / s.z)  * H/2 + cy;
    const psx = (s.x  / s.pz) * W/2 + cx;
    const psy = (s.y  / s.pz) * H/2 + cy;
    const size   = Math.max(0.5, (1 - s.z) * 2.5);
    const bright = 1 - s.z;
    ctx.strokeStyle = `rgba(57,220,0,${bright})`;
    ctx.lineWidth = size;
    ctx.beginPath(); ctx.moveTo(psx, psy); ctx.lineTo(sx, sy); ctx.stroke();
  });
}

// ─────────────────────────────────────────────────────────────
// D. AUTO SNAKE
// ─────────────────────────────────────────────────────────────
const SZ = 8;
let snake, snakeDir, food, snakeTick;

function initSnake() {
  const cols = Math.floor(W/SZ), rows = Math.floor(H/SZ);
  snake = [{x:Math.floor(cols/2), y:Math.floor(rows/2)}];
  snakeDir = {x:1, y:0};
  food = {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)};
  snakeTick = 0;
}

function stepSnake() {
  const cols = Math.floor(W/SZ), rows = Math.floor(H/SZ);
  const head = snake[0];
  // 간단 AI: 음식 방향으로 이동, 벽·몸 회피
  const dx = food.x - head.x, dy = food.y - head.y;
  const options = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]
    .filter(d => !(d.x===-snakeDir.x && d.y===-snakeDir.y)) // 역방향 제외
    .map(d => {
      const nx = (head.x+d.x+cols)%cols, ny = (head.y+d.y+rows)%rows;
      const hit = snake.some(s => s.x===nx && s.y===ny);
      const score = (d.x===Math.sign(dx)?2:0) + (d.y===Math.sign(dy)?2:0) - (hit?99:0);
      return {...d, score, nx, ny};
    })
    .sort((a,b) => b.score - a.score);

  if (options.length) snakeDir = options[0];

  const newHead = {x:(head.x+snakeDir.x+cols)%cols, y:(head.y+snakeDir.y+rows)%rows};
  snake.unshift(newHead);

  if (newHead.x===food.x && newHead.y===food.y) {
    food = {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)};
  } else {
    snake.pop();
  }
  if (snake.length > 28) snake.pop(); // 최대 길이
}

function drawSnake() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  // 그리드 (희미하게)
  ctx.strokeStyle = 'rgba(57,220,0,0.06)';
  ctx.lineWidth = 0.5;
  const cols = Math.floor(W/SZ), rows = Math.floor(H/SZ);
  for (let c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,H);ctx.stroke();}
  for (let r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(W,r*SZ);ctx.stroke();}

  snakeTick++;
  if (snakeTick % 3 === 0) stepSnake();

  // 뱀 몸통
  snake.forEach((s,i) => {
    const a = 1 - i/snake.length * 0.7;
    ctx.fillStyle = i===0 ? '#ffffff' : `rgba(57,220,0,${a})`;
    ctx.fillRect(s.x*SZ+1, s.y*SZ+1, SZ-2, SZ-2);
    if (i===0) {
      ctx.fillStyle = '#000';
      ctx.fillRect(s.x*SZ+2, s.y*SZ+2, 2, 2); // 눈
      ctx.fillRect(s.x*SZ+SZ-4, s.y*SZ+2, 2, 2);
    }
  });
  // 먹이
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(food.x*SZ+2, food.y*SZ+2, SZ-4, SZ-4);
  // 먹이 깜빡임
  if (Math.floor(Date.now()/300)%2===0) {
    ctx.fillStyle = '#ffaaaa';
    ctx.fillRect(food.x*SZ+3, food.y*SZ+3, SZ-6, SZ-6);
  }
}

// ─────────────────────────────────────────────────────────────
// E. OSCILLOSCOPE
// ─────────────────────────────────────────────────────────────
let oscT = 0;
function initOsc() { oscT = 0; }

function drawOsc() {
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, W, H);

  // 그리드
  ctx.strokeStyle = 'rgba(57,220,0,0.1)';
  ctx.lineWidth = 0.5;
  for (let x=0;x<W;x+=W/8){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=H/4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // 채널 A — 복합 파형 (주파수 혼합)
  const drawWave = (freqs, color, yOff) => {
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.shadowColor = color; ctx.shadowBlur = 4;
    ctx.beginPath();
    for (let x=0; x<W; x++) {
      const t = oscT + x * 0.025;
      let y = 0;
      freqs.forEach(([f,a,p]) => y += Math.sin(t*f+p)*a);
      const py = H/2 + yOff + y * (H*0.18);
      x===0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  };

  drawWave([[1,0.7,0],[2.3,0.3,1.2],[0.5,0.4,2.4]], '#39dc00', -H*0.2);
  drawWave([[1.7,0.6,0.5],[3.1,0.25,2],[0.8,0.35,4]], 'rgba(57,220,0,0.5)', H*0.2);

  // 트리거 라인
  ctx.strokeStyle = 'rgba(255,80,80,0.4)';
  ctx.setLineDash([4,4]); ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.setLineDash([]);

  // 스크린 라벨
  ctx.fillStyle = 'rgba(57,220,0,0.5)'; ctx.font = '8px Courier New';
  ctx.fillText('CH1  1V/div', 8, 12);
  ctx.fillText('CH2  1V/div', 8, 22);
  ctx.fillStyle = 'rgba(57,220,0,0.3)';
  ctx.fillText('10ms/div', W-60, 12);
  ctx.fillText(`${(oscT*5).toFixed(1)}ms`, W-50, H-6);

  oscT += 0.04;
}

// ─────────────────────────────────────────────────────────────
// F. DECODE (ENHANCED)
// ─────────────────────────────────────────────────────────────
const DEC_NOISE   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*?/\\|<>!~^';
const DEC_HEX     = '0123456789ABCDEF';
const DEC_MSGS = [
  { text: 'SET WORLD DIRECTORY', corrupt: false },
  { text: 'ACCESSING FILES...', corrupt: false },
  { text: '>>> AUTH LEVEL: RESTRICTED', corrupt: false },
  { text: 'C:\\WORLD\\SET\\INCLUSION\\', corrupt: false },
  { text: 'KERNEL INTEGRITY: OK', corrupt: false },
  { text: '%%% SECTOR FAULT — RETRY', corrupt: true  },
  { text: 'DECRYPTING PAYLOAD...', corrupt: false },
];
let decLines2 = [], decTick2 = 0;

// stage: 0=hex noise, 1=ascii noise, 2=partial decode, 3=done
function mkLine(li) {
  const cfg = DEC_MSGS[li % DEC_MSGS.length];
  return {
    target:  cfg.text,
    corrupt: cfg.corrupt,
    chars:   Array.from({length: cfg.text.length}, () => rndHex2()),
    stage:   0,
    t:       0,
    startT:  li * 22,
    done:    false,
    glitch:  0,
  };
}
function rndHex2() {
  return DEC_HEX[Math.floor(Math.random()*16)] + DEC_HEX[Math.floor(Math.random()*16)];
}
function rndNoise() { return DEC_NOISE[Math.floor(Math.random()*DEC_NOISE.length)]; }

function initDecode() {
  decTick2 = 0;
  decLines2 = DEC_MSGS.map((_, i) => mkLine(i));
}

function stepDecode() {
  decTick2++;
  decLines2.forEach((line, li) => {
    line.t++;
    if (line.t < line.startT) return;
    const elapsed = line.t - line.startT;

    // stage 0 → 1: hex→ascii noise (40틱)
    if (line.stage === 0 && elapsed > 18) {
      line.stage = 1;
      line.chars = Array.from({length: line.target.length}, () => rndNoise());
    }
    // stage 1 → 2: 글자 하나씩 해독 시작 (60틱부터)
    if (line.stage === 1 && elapsed > 40) line.stage = 2;

    if (line.stage === 0) {
      // 헥스 노이즈 업데이트
      if (decTick2 % 2 === 0) {
        const idx = Math.floor(Math.random() * line.target.length);
        line.chars[idx] = rndHex2();
      }
    } else if (line.stage === 1) {
      // ascii 노이즈 업데이트
      if (decTick2 % 2 === 0) {
        const idx = Math.floor(Math.random() * line.target.length);
        line.chars[idx] = rndNoise();
      }
    } else if (line.stage === 2) {
      // 왼쪽부터 순차 해독
      const progress = (elapsed - 40) / (line.target.length * 3.5 + 20);
      line.target.split('').forEach((ch, i) => {
        if (line.chars[i] === ch) return;
        if (i / line.target.length < progress) {
          line.chars[i] = line.corrupt && Math.random() < 0.15 ? rndNoise() : ch;
        } else if (decTick2 % 3 === 0) {
          line.chars[i] = rndNoise();
        }
      });
      if (line.chars.every((c,i) => c === line.target[i] || (line.corrupt && c !== line.target[i]))) {
        if (!line.corrupt) { line.stage = 3; line.done = true; }
      }
      if (progress > 1.2 && !line.done) { line.stage = 3; line.done = true; }
    }

    // 가끔 글리치 (corrupt 라인은 더 자주)
    if (Math.random() < (line.corrupt ? 0.04 : 0.008)) line.glitch = 4;
    if (line.glitch > 0) {
      const gi = Math.floor(Math.random() * line.target.length);
      line.chars[gi] = rndNoise(); line.glitch--;
    }

    // 완료 후 리셋
    if (line.done && elapsed > line.target.length * 4 + 120) {
      Object.assign(line, mkLine(li));
    }
  });
}

function drawDecode() {
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(0, 0, W, H);
  stepDecode();

  const PX = 9.2; // 글자 폭
  const lineH = (H - 24) / decLines2.length;

  decLines2.forEach((line, li) => {
    const y = 18 + lineH * li + lineH * 0.7;
    const x = 56; // prefix 뒤
    if (line.t < line.startT) return;

    // 라인 번호 / 상태 prefix
    const prefix = line.done
      ? (line.corrupt ? '[ERR]' : '[OK] ')
      : `[${String(li).padStart(2,'0')}] `;
    ctx.font = '9px Courier New';
    ctx.fillStyle = line.corrupt ? 'rgba(255,80,80,0.7)'
                  : line.done    ? 'rgba(57,220,0,0.5)'
                  :                'rgba(57,220,0,0.3)';
    ctx.fillText(prefix, 8, y);

    // 진행바 (오른쪽 끝)
    const progress = Math.min(1, line.stage >= 3 ? 1 :
      line.stage === 2 ? ((line.t - line.startT - 40) / (line.target.length * 3.5 + 20)) :
      line.stage === 1 ? 0.3 : 0.1);
    const barW = 30, barX = W - barW - 6;
    ctx.fillStyle = 'rgba(57,220,0,0.15)';
    ctx.fillRect(barX, y-8, barW, 7);
    ctx.fillStyle = line.corrupt ? 'rgba(255,80,80,0.6)' : `rgba(57,220,0,${0.4 + progress*0.5})`;
    ctx.fillRect(barX, y-8, barW * progress, 7);

    // 글자 그리기
    ctx.font = 'bold 10px Courier New';
    line.chars.forEach((ch, i) => {
      const isDone = ch === line.target[i];
      const isSpace = line.target[i] === ' ';
      if (isSpace && !isDone) { return; }

      let color;
      if (isDone && line.corrupt)    color = `rgba(255,100,100,${0.6 + Math.random()*0.4})`;
      else if (isDone)               color = `rgba(57,220,0,${0.8 + Math.random()*0.2})`;
      else if (line.stage === 0)     color = `rgba(57,180,0,${0.3 + Math.random()*0.3})`;
      else                           color = `rgba(57,220,0,${0.2 + Math.random()*0.3})`;

      ctx.fillStyle = color;
      // stage 0: 두 자리 hex를 한 칸에
      const drawCh = line.stage === 0 ? (ch.length === 2 ? ch[0] : ch) : ch;
      ctx.fillText(drawCh, x + i * PX, y);
    });

    // 커서 (현재 해독 위치)
    if (line.stage === 2 && !line.done) {
      const cur = line.chars.findIndex((c,i) => c !== line.target[i] && line.target[i] !== ' ');
      if (cur !== -1 && Math.floor(Date.now()/150) % 2 === 0) {
        ctx.fillStyle = line.corrupt ? '#ff6060' : '#ffffff';
        ctx.fillRect(x + cur*PX - 1, y - 10, 8, 11);
      }
    }
  });

  // 상단 헤더
  ctx.fillStyle = 'rgba(57,220,0,0.4)'; ctx.font = '8px Courier New';
  ctx.fillText(`DECRYPT ENGINE v2.4 — TICK:${decTick2.toString().padStart(5,'0')}`, 8, 10);
  const done = decLines2.filter(l => l.done && !l.corrupt).length;
  ctx.textAlign = 'right';
  ctx.fillText(`${done}/${decLines2.length} OK`, W-8, 10);
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────────────────────
// 전환 로직
// ─────────────────────────────────────────────────────────────
const ANIMS = {
  life:   { init: initLife,   draw: drawLife   },
  radar:  { init: initRadar,  draw: drawRadar  },
  warp:   { init: initWarp,   draw: drawWarp   },
  snake:  { init: initSnake,  draw: drawSnake  },
  osc:    { init: initOsc,    draw: drawOsc    },
  decode: { init: initDecode, draw: drawDecode },
};

function initAnim(name) {
  if (animInterval) clearInterval(animInterval);
  currentAnim = name;
  ANIMS[name].init();
  animInterval = setInterval(ANIMS[name].draw, 40);
}

function switchAnim(name) {
  document.querySelectorAll('.sel-btn').forEach((b,i) => {
    b.classList.toggle('active', Object.keys(ANIMS)[i] === name);
  });
  initAnim(name);
}

initAnim('life');
</script>
</body>
</html>
