<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Measure Banner Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0a0a0a; color:#00ff00;
      font-family:'Press Start 2P',monospace;
      padding:40px 24px;
      display:flex; flex-direction:column; align-items:center; gap:32px;
    }
    h1 { font-size:8px; letter-spacing:2px; text-shadow:0 0 10px #00ff00; }
    .subtitle { font-size:5px; color:rgba(0,255,0,0.4); letter-spacing:1px; }

    .panel-sim {
      width: 540px;
      background: #000;
      border: 1px solid #003300;
    }
    .banner-area {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 20px 0;
      gap: 0;
    }
    .search-sim {
      display: flex; border-top: 1px solid #003300;
      padding: 12px 16px; gap: 10px;
    }
    .search-sim input {
      flex: 1; background: #000; border: 1px solid #004400;
      color: #00ff00; padding: 8px 10px;
      font-family: 'Press Start 2P', monospace; font-size: 7px; outline: none;
    }
    .search-sim button {
      background: #003800; border: 1px solid #00ff00;
      color: #00ff00; padding: 8px 14px;
      font-family: 'Press Start 2P', monospace; font-size: 7px; cursor: pointer;
    }
    canvas { display: block; }
  </style>
</head>
<body>

<h1>▶ SEARCHLIGHT + TERMINAL</h1>
<div class="subtitle">MEASURE SECTION BANNER PREVIEW</div>

<div class="panel-sim">
  <div class="banner-area">
    <!-- 위: 서치라이트 -->
    <canvas id="cLight"></canvas>
    <!-- 아래: 터미널 -->
    <canvas id="cTerm"></canvas>
  </div>
  <div class="search-sim">
    <input placeholder="Search: crash / floating / shadow..." readonly>
    <button>SEARCH</button>
  </div>
</div>

<script>
setTimeout(()=>{

const dpr = window.devicePixelRatio || 1;

// ════════════════════════════════════
// 위 캔버스 — SEARCHLIGHT SWEEP
// ════════════════════════════════════
(function(){
  const c = document.getElementById('cLight');
  const ctx = c.getContext('2d');
  const LW = 495, LH = 240;
  c.width  = LW * dpr; c.height = LH * dpr;
  c.style.width = LW+'px'; c.style.height = LH+'px';
  ctx.scale(dpr, dpr);
  const W=LW, H=LH;
  let tick=0;

  const OBJECTS=[
    { x:70,  y:22,  w:62, h:72,  label:'#031' },
    { x:150, y:16,  w:55, h:88,  label:'#047' },
    { x:220, y:24,  w:68, h:65,  label:'#023' },
    { x:304, y:18,  w:52, h:80,  label:'#088' },
    { x:370, y:22,  w:70, h:62,  label:'#012' },
    { x:18,  y:120, w:75, h:58,  label:'#055' },
    { x:110, y:115, w:60, h:60,  label:'#064' },
    { x:192, y:112, w:70, h:64,  label:'#019' },
    { x:282, y:118, w:58, h:58,  label:'#033' },
    { x:358, y:114, w:78, h:60,  label:'#071' },
  ];

  const LX = W/2, LY = H + 55, SPREAD = 0.20;
  function getAngle(){ return Math.sin(tick*0.016)*0.88; }
  function isLit(o, angle){
    const dx=o.x+o.w/2-LX, dy=o.y+o.h/2-LY;
    return Math.abs(Math.atan2(dy,dx)-(-Math.PI/2)-angle) < SPREAD+0.08;
  }

  const off=document.createElement('canvas');
  off.width=c.width; off.height=c.height;
  const octx=off.getContext('2d');
  octx.scale(dpr,dpr);
  octx.fillStyle='#000'; octx.fillRect(0,0,W,H);

  function draw(){
    octx.fillStyle='rgba(0,0,0,0.13)'; octx.fillRect(0,0,W,H);
    const angle=getAngle();

    // 빔
    const tipX=LX+Math.sin(angle)*800, tipY=LY-Math.cos(angle)*800;
    const beamG=octx.createRadialGradient(LX,LY,0,tipX,tipY,W*0.9);
    beamG.addColorStop(0,'rgba(0,255,80,0.22)');
    beamG.addColorStop(0.28,'rgba(0,255,60,0.09)');
    beamG.addColorStop(1,'rgba(0,0,0,0)');
    octx.save();
    octx.beginPath(); octx.moveTo(LX,LY);
    for(let a=angle-SPREAD;a<=angle+SPREAD;a+=0.008)
      octx.lineTo(LX+Math.sin(a)*800, LY-Math.cos(a)*800);
    octx.closePath(); octx.fillStyle=beamG; octx.fill();
    octx.restore();

    // 빔 코어
    octx.save(); octx.shadowColor='#00ff80'; octx.shadowBlur=20;
    octx.strokeStyle='rgba(0,255,100,0.16)'; octx.lineWidth=5;
    octx.beginPath(); octx.moveTo(LX,LY);
    octx.lineTo(LX+Math.sin(angle)*700, LY-Math.cos(angle)*700);
    octx.stroke(); octx.restore();

    // 블록
    OBJECTS.forEach(o=>{
      const lit=isLit(o,angle);
      if(lit){
        octx.save(); octx.shadowColor='#00ff00'; octx.shadowBlur=16;
        octx.strokeStyle='rgba(0,255,70,0.92)'; octx.lineWidth=2;
        octx.strokeRect(o.x,o.y,o.w,o.h);
        octx.fillStyle='rgba(0,70,25,0.35)'; octx.fillRect(o.x+1,o.y+1,o.w-2,o.h-2);
        const mx=o.x+o.w/2, my=o.y+o.h/2;
        octx.strokeStyle='rgba(0,255,80,0.55)'; octx.lineWidth=1;
        octx.beginPath(); octx.moveTo(mx-7,my); octx.lineTo(mx+7,my); octx.stroke();
        octx.beginPath(); octx.moveTo(mx,my-7); octx.lineTo(mx,my+7); octx.stroke();
        octx.font="7px 'Press Start 2P',monospace";
        octx.fillStyle='rgba(0,255,80,0.95)'; octx.textAlign='center';
        octx.fillText(o.label,mx,my+3); octx.restore();
      } else {
        octx.strokeStyle='rgba(0,38,0,0.5)'; octx.lineWidth=1;
        octx.strokeRect(o.x,o.y,o.w,o.h);
        octx.font="5px 'Press Start 2P',monospace";
        octx.fillStyle='rgba(0,55,0,0.45)'; octx.textAlign='center';
        octx.fillText(o.label,o.x+o.w/2,o.y+o.h/2+2);
      }
    });

    // 탐조등 장치
    const headX=LX+Math.sin(angle)*22, headY=H-20;
    octx.save(); octx.shadowColor='#00ff00'; octx.shadowBlur=18;
    octx.strokeStyle='rgba(0,210,0,0.65)'; octx.lineWidth=4;
    octx.beginPath(); octx.moveTo(LX-7,H); octx.lineTo(LX-7,H-16); octx.stroke();
    octx.beginPath(); octx.moveTo(LX+7,H); octx.lineTo(LX+7,H-16); octx.stroke();
    octx.strokeStyle='rgba(0,180,0,0.5)'; octx.lineWidth=3;
    octx.beginPath(); octx.moveTo(LX-18,H); octx.lineTo(LX+18,H); octx.stroke();
    octx.fillStyle='rgba(0,210,70,0.88)';
    octx.beginPath(); octx.ellipse(headX,headY,18,11,angle*0.5,0,Math.PI*2); octx.fill();
    octx.shadowBlur=28; octx.fillStyle='rgba(0,255,120,0.85)';
    octx.beginPath(); octx.ellipse(headX+Math.sin(angle)*5,headY,6,4,angle*0.5,0,Math.PI*2); octx.fill();
    octx.restore();

    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(off,0,0,W,H,0,0,W,H);

    // HUD
    const litN=OBJECTS.filter(o=>isLit(o,angle)).length;
    ctx.font="6px 'Press Start 2P',monospace";
    ctx.fillStyle='rgba(0,255,0,0.3)'; ctx.textAlign='left';
    ctx.fillText(`FOUND: ${litN} / ${OBJECTS.length}`,10,13);
    ctx.textAlign='right';
    ctx.fillText(`SWEEP ${(angle*57.3).toFixed(1)}°`,W-10,13);

    // CRT
    ctx.fillStyle='rgba(0,0,0,0.08)';
    for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);

    // 브라켓 (위 3개 면만 — 아래는 터미널과 붙어있음)
    const bk=12; ctx.strokeStyle='rgba(0,255,0,0.45)'; ctx.lineWidth=1.5;
    // 왼쪽 위
    ctx.beginPath(); ctx.moveTo(0,bk); ctx.lineTo(0,0); ctx.lineTo(bk,0); ctx.stroke();
    // 오른쪽 위
    ctx.beginPath(); ctx.moveTo(W-bk,0); ctx.lineTo(W,0); ctx.lineTo(W,bk); ctx.stroke();
    // 왼쪽 아래 (없음 — 터미널과 연결)
    // 오른쪽 아래 (없음)

    tick++;
  }
  setInterval(draw, 33);
})();


// ════════════════════════════════════
// 아래 캔버스 — TERMINAL PROMPT
// ════════════════════════════════════
(function(){
  const c = document.getElementById('cTerm');
  const ctx = c.getContext('2d');
  const LW = 495, LH = 105;
  c.width  = LW * dpr; c.height = LH * dpr;
  c.style.width = LW+'px'; c.style.height = LH+'px';
  ctx.scale(dpr, dpr);
  const W=LW, H=LH;
  let tick=0;

  const FS=7, LHt=16;
  const LINES=[
    { prefix:'SYS>  ', text:'MEASURE.DB  [2847 FILES READY]', delay:0   },
    { prefix:'SCAN> ', text:'INDEXING KEYWORDS...',           delay:45  },
    { prefix:'Q>    ', text:'ENTER KEYWORD TO SEARCH',        delay:100 },
    { prefix:'TIP>  ', text:'crash / shadow / float / scale', delay:170 },
    { prefix:'TIP>  ', text:'yellow / border / distance',     delay:240 },
    { prefix:'_     ', text:'',                               delay:310, isCursor:true },
  ];
  let typeState=0;
  const TOTAL=LINES.reduce((s,l)=>s+l.prefix.length+l.text.length,0);

  function draw(){
    // 배경
    ctx.fillStyle='rgba(0,3,0,0.96)'; ctx.fillRect(0,0,W,H);

    // 가로 그리드 (희미)
    ctx.strokeStyle='rgba(0,30,0,0.4)'; ctx.lineWidth=0.5;
    for(let y=0;y<H;y+=LHt){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // 타이핑
    if(typeState < TOTAL+80) typeState += 0.88;
    else typeState = 0;

    LINES.forEach((line,li)=>{
      if(typeState < line.delay) return;
      const y = 14 + li*LHt;
      if(y > H-4) return;
      const full = line.prefix + line.text;
      const typed = Math.min(full.length, Math.floor(typeState - line.delay));
      const display = full.slice(0, typed);

      ctx.font=`${FS}px 'Press Start 2P',monospace`; ctx.textAlign='left';

      // prefix
      ctx.fillStyle='rgba(0,180,0,0.55)';
      ctx.fillText(display.slice(0, line.prefix.length), 12, y);
      // body
      ctx.fillStyle = line.isCursor ? 'rgba(0,255,0,0.9)' : 'rgba(0,255,80,0.82)';
      ctx.fillText(display.slice(line.prefix.length), 12 + line.prefix.length*FS*0.62, y);

      // 타이핑 중 커서
      if(!line.isCursor && typed < full.length && typed > 0){
        const cx2 = 12 + Math.min(typed,line.prefix.length)*FS*0.62
                       + Math.max(0,typed-line.prefix.length)*FS*0.62;
        if(Math.floor(tick/9)%2===0){ ctx.fillStyle='rgba(0,255,0,0.9)'; ctx.fillRect(cx2,y-FS+2,4,FS); }
      }
      // 마지막 줄 깜빡이는 커서
      if(line.isCursor && typed>0 && Math.floor(tick/16)%2===0){
        ctx.fillStyle='rgba(0,255,0,0.9)'; ctx.fillRect(12,y-FS+2,FS*0.62,FS);
      }
    });

    // 왼쪽 세로 포인터 라인
    ctx.fillStyle='rgba(0,255,0,0.18)'; ctx.fillRect(8,0,1,H);

    // CRT
    ctx.fillStyle='rgba(0,0,0,0.08)';
    for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);

    // 브라켓 (아래 3개 면만 — 위는 서치라이트와 붙어있음)
    const bk=12; ctx.strokeStyle='rgba(0,255,0,0.45)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,H-bk); ctx.lineTo(0,H); ctx.lineTo(bk,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-bk,H); ctx.lineTo(W,H); ctx.lineTo(W,H-bk); ctx.stroke();
    // 왼쪽, 오른쪽 세로선 전체 연결
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W,H); ctx.stroke();

    tick++;
  }
  setInterval(draw, 40);
})();

}, 500);
</script>
</body>
</html>
