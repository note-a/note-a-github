<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Measure Banner Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0a0a0a; color:#00ff00;
      font-family:'Press Start 2P',monospace;
      padding:40px 24px;
      display:flex; flex-direction:column; align-items:center; gap:32px;
    }
    h1 { font-size:8px; letter-spacing:2px; text-shadow:0 0 10px #00ff00; }
    .subtitle { font-size:5px; color:rgba(0,255,0,0.4); letter-spacing:1px; }

    .panel-sim {
      width:540px;
      background:#000;
      border:1px solid #003300;
    }
    .banner-area {
      display:flex; flex-direction:column; align-items:center;
      gap:10px; padding:20px 20px 14px;
    }
    .hint-text {
      font-size:9px; color:#00ff00; text-align:center;
      letter-spacing:1px; text-shadow:0 0 8px rgba(0,255,0,0.6);
    }
    .search-sim {
      display:flex; border-top:1px solid #003300;
      padding:12px 16px; gap:10px;
    }
    .search-sim input {
      flex:1; background:#000; border:1px solid #004400;
      color:#00ff00; padding:8px 10px;
      font-family:'Press Start 2P',monospace; font-size:7px; outline:none;
    }
    .search-sim button {
      background:#003800; border:1px solid #00ff00;
      color:#00ff00; padding:8px 14px;
      font-family:'Press Start 2P',monospace; font-size:7px; cursor:pointer;
    }
    /* canvas는 style로 크기 지정 — 실제 픽셀은 DPR 배수 */
    #c { display:block; }
  </style>
</head>
<body>

<h1>▶ SEARCHLIGHT SWEEP</h1>
<div class="subtitle">MEASURE SECTION BANNER — SEARCHLIGHT CONCEPT</div>

<div class="panel-sim">
  <div class="banner-area">
    <canvas id="c"></canvas>
    <div class="hint-text">WHAT ARE YOU LOOKING FOR</div>
  </div>
  <div class="search-sim">
    <input placeholder="Search: crash / floating / shadow..." readonly>
    <button>SEARCH</button>
  </div>
</div>

<script>
setTimeout(()=>{

const c = document.getElementById('c');
const ctx = c.getContext('2d');

// ── HiDPI 화질 개선 ──
const dpr = window.devicePixelRatio || 1;
const LW = 495, LH = 315;           // 논리적 크기 (CSS px)
c.width  = LW * dpr;
c.height = LH * dpr;
c.style.width  = LW + 'px';
c.style.height = LH + 'px';
ctx.scale(dpr, dpr);
const W = LW, H = LH;

let tick = 0;

// ── 이미지 블록 (원래 × 1.5) ──
const OBJECTS = [
  { x:90,  y:30,  w:62, h:82,  label:'#031' },
  { x:172, y:22,  w:55, h:105, label:'#047' },
  { x:248, y:35,  w:68, h:75,  label:'#023' },
  { x:332, y:26,  w:50, h:90,  label:'#088' },
  { x:400, y:30,  w:70, h:66,  label:'#012' },
  { x:18,  y:140, w:78, h:62,  label:'#055' },
  { x:120, y:148, w:62, h:57,  label:'#064' },
  { x:210, y:142, w:70, h:65,  label:'#019' },
  { x:300, y:145, w:58, h:60,  label:'#033' },
  { x:382, y:140, w:78, h:62,  label:'#071' },
];

// ── 탐조등 ──
const LX = W / 2;          // 탐조등 원점 X
const LY = H + 65;         // 탐조등 원점 Y (화면 밖 아래)
const SPREAD = 0.20;

function getAngle(){ return Math.sin(tick * 0.016) * 0.88; }

function isLit(obj, angle){
  const bx = obj.x + obj.w/2, by = obj.y + obj.h/2;
  const dx = bx - LX, dy = by - LY;
  const oa = Math.atan2(dy, dx) - (-Math.PI/2);
  return Math.abs(oa - angle) < SPREAD + 0.08;
}

// ── 오프스크린 트레일 버퍼 ──
const off = document.createElement('canvas');
off.width = c.width; off.height = c.height;
const octx = off.getContext('2d');
octx.scale(dpr, dpr);
octx.fillStyle = '#000'; octx.fillRect(0,0,W,H);

function draw(){
  // 트레일 페이드
  octx.fillStyle = 'rgba(0,0,0,0.13)'; octx.fillRect(0,0,W,H);

  const angle = getAngle();

  // ── 빔 그라디언트 ──
  const tipX = LX + Math.sin(angle) * 900;
  const tipY = LY - Math.cos(angle) * 900;
  const beamG = octx.createRadialGradient(LX, LY, 0, tipX, tipY, W * 0.85);
  beamG.addColorStop(0,   'rgba(0,255,80,0.24)');
  beamG.addColorStop(0.28,'rgba(0,255,60,0.10)');
  beamG.addColorStop(1,   'rgba(0,0,0,0)');
  octx.save();
  octx.beginPath(); octx.moveTo(LX, LY);
  for(let a = angle - SPREAD; a <= angle + SPREAD; a += 0.008){
    octx.lineTo(LX + Math.sin(a)*900, LY - Math.cos(a)*900);
  }
  octx.closePath(); octx.fillStyle = beamG; octx.fill();
  octx.restore();

  // ── 빔 중심선 (밝은 코어) ──
  octx.save();
  octx.shadowColor = '#00ff80'; octx.shadowBlur = 22;
  octx.strokeStyle = 'rgba(0,255,100,0.18)'; octx.lineWidth = 6;
  octx.beginPath();
  octx.moveTo(LX, LY);
  octx.lineTo(LX + Math.sin(angle)*700, LY - Math.cos(angle)*700);
  octx.stroke();
  octx.restore();

  // ── 이미지 블록 ──
  OBJECTS.forEach(obj => {
    const lit = isLit(obj, angle);
    if(lit){
      octx.save();
      octx.shadowColor = '#00ff00'; octx.shadowBlur = 18;
      octx.strokeStyle = 'rgba(0,255,70,0.92)'; octx.lineWidth = 2;
      octx.strokeRect(obj.x, obj.y, obj.w, obj.h);
      octx.fillStyle = 'rgba(0,70,25,0.38)';
      octx.fillRect(obj.x+1, obj.y+1, obj.w-2, obj.h-2);
      // 십자 마커
      const mx = obj.x + obj.w/2, my = obj.y + obj.h/2;
      octx.strokeStyle = 'rgba(0,255,80,0.6)'; octx.lineWidth = 1;
      octx.beginPath(); octx.moveTo(mx-8,my); octx.lineTo(mx+8,my); octx.stroke();
      octx.beginPath(); octx.moveTo(mx,my-8); octx.lineTo(mx,my+8); octx.stroke();
      // ID 라벨
      octx.font = "7px 'Press Start 2P',monospace";
      octx.fillStyle = 'rgba(0,255,80,0.95)'; octx.textAlign = 'center';
      octx.fillText(obj.label, mx, my + 4);
      octx.restore();
    } else {
      // 어두운 상태
      octx.strokeStyle = 'rgba(0,40,0,0.55)'; octx.lineWidth = 1;
      octx.strokeRect(obj.x, obj.y, obj.w, obj.h);
      // 매우 어두운 라벨
      octx.font = "5px 'Press Start 2P',monospace";
      octx.fillStyle = 'rgba(0,60,0,0.5)'; octx.textAlign = 'center';
      octx.fillText(obj.label, obj.x+obj.w/2, obj.y+obj.h/2+2);
    }
  });

  // ── 탐조등 장치 (하단) ──
  const headX = LX + Math.sin(angle) * 24;
  const headY = H - 22;
  octx.save();
  octx.shadowColor = '#00ff00'; octx.shadowBlur = 20;
  // 기둥
  octx.strokeStyle = 'rgba(0,220,0,0.7)'; octx.lineWidth = 4;
  octx.beginPath(); octx.moveTo(LX-8,H); octx.lineTo(LX-8,H-18); octx.stroke();
  octx.beginPath(); octx.moveTo(LX+8,H); octx.lineTo(LX+8,H-18); octx.stroke();
  // 받침대
  octx.strokeStyle = 'rgba(0,200,0,0.5)'; octx.lineWidth = 3;
  octx.beginPath(); octx.moveTo(LX-20,H); octx.lineTo(LX+20,H); octx.stroke();
  // 회전 머리
  octx.fillStyle = 'rgba(0,210,70,0.9)';
  octx.beginPath(); octx.ellipse(headX, headY, 20, 12, angle*0.5, 0, Math.PI*2);
  octx.fill();
  // 렌즈
  octx.shadowBlur = 30;
  octx.fillStyle = 'rgba(0,255,120,0.85)';
  octx.beginPath(); octx.ellipse(headX + Math.sin(angle)*6, headY, 7, 5, angle*0.5, 0, Math.PI*2);
  octx.fill();
  octx.restore();

  // ── 메인 캔버스로 합성 ──
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.drawImage(off, 0,0, W,H, 0,0, W,H);

  // ── 상단 HUD ──
  const litCount = OBJECTS.filter(o => isLit(o, angle)).length;
  ctx.font = "6px 'Press Start 2P',monospace";
  ctx.fillStyle = 'rgba(0,255,0,0.32)'; ctx.textAlign = 'left';
  ctx.fillText(`FOUND: ${litCount} / ${OBJECTS.length}`, 10, 14);
  ctx.textAlign = 'right';
  ctx.fillText(`SWEEP ${(angle*57.3).toFixed(1)}°`, W-10, 14);

  // ── CRT 스캔라인 ──
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for(let y=0; y<H; y+=2) ctx.fillRect(0,y,W,1);

  // ── 코너 브라켓 ──
  const bk = 14;
  ctx.strokeStyle = 'rgba(0,255,0,0.5)'; ctx.lineWidth = 1.5;
  [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
    ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
  });

  tick++;
}

setInterval(draw, 33);

}, 500);
</script>
</body>
</html>
