<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET - MENU</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #000; color: #39dc00; font-family: 'Courier New', monospace; height: 100%; overflow: hidden; }

.top-banner {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 32px;
  background: #000; border-bottom: 2px dashed #ff3333; color: #ff3333;
  padding: 6px 0; z-index: 999; overflow: hidden;
  animation: marquee 12s linear infinite;
  font-size: 12px;
}

@keyframes marquee { 0% { text-indent: 100vw; } 100% { text-indent: -150vw; } }

.menu-container {
  display: flex; justify-content: center; align-items: center;
  width: 100%; height: calc(100vh - 32px);
  margin-top: 32px;
  padding: 20px;
  position: relative; z-index: 1;
  overflow: hidden;
}

.folder-window {
  border: 1.5px solid #39dc00;
  background: #000;
  width: 520px;
  height: 400px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 14px rgba(57,220,0,0.65), 0 0 32px rgba(57,220,0,0.2);
  position: relative;
}

/* 안쪽 점선 (카드와 동일) */
.folder-window::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px dashed rgba(57,220,0,0.15);
  pointer-events: none;
  z-index: 2;
}

.folder-titlebar {
  background: #000;
  color: #39dc00;
  padding: 5px 8px;
  font-weight: bold;
  font-size: 11px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(57,220,0,0.25);
  gap: 0;
}

.titlebar-fill {
  flex: 1;
  overflow: hidden;
  color: rgba(57,220,0,0.2);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 0 4px;
  white-space: nowrap;
  font-weight: normal;
}

.folder-icons {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

.folder-icon {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 9px;
  font-family: 'Courier New', monospace;
  color: rgba(57,220,0,0.45);
  padding: 1px 2px;
  letter-spacing: 0;
  transition: color 0.1s;
}

.folder-icon:hover {
  color: #39dc00;
}

.folder-content {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  background: #000;
  color: #39dc00;
  font-size: 12px;
  line-height: 1.8;
  border-top: 1px solid #39dc00;
}

.path-bar {
  padding: 8px 12px;
  border-bottom: 1px solid #39dc00;
  background: #000;
  color: #39dc00;
  font-size: 11px;
  border-top: 1px solid #39dc00;
}

.menu-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.menu-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 12px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid rgba(57,220,0,0.18);
  background: #000;
  text-align: center;
  min-height: 80px;
}

.menu-item:hover,
.menu-item.selected {
  background: rgba(57,220,0,0.07);
  border-color: rgba(57,220,0,0.5);
  box-shadow: inset 0 0 20px rgba(57,220,0,0.04);
}

.menu-item-icon {
  margin-bottom: 8px;
  width: 100%;
  text-align: center;
  font-size: 20px;
}

.menu-item-name {
  flex: 1;
  word-break: break-all;
  font-size: 13px;
  font-weight: bold;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #000;
  border-left: 1px solid #39dc00;
}

::-webkit-scrollbar-thumb {
  background: #39dc00;
}

::-webkit-scrollbar-thumb:hover {
  background: #ff9900;
}

.status-bar {
  padding: 8px 12px;
  border-top: 1px solid #39dc00;
  background: #000;
  color: #39dc00;
  font-size: 11px;
  display: flex;
  justify-content: space-between;
  text-align: center;
}

#loadingCanvas {
  border: 1.5px solid #39dc00;
  box-shadow: 0 0 14px rgba(57,220,0,0.65), 0 0 32px rgba(57,220,0,0.2);
}

@media (max-width: 768px) {
  .folder-window {
    max-width: 95vw;
  }

  .folder-content {
    font-size: 11px;
  }

  .menu-item {
    padding: 6px 10px;
  }
}

  </style>
</head>
<body>
  <div class="top-banner">&gt;&gt;&gt; FATAL_BREACH_DETECTED : SYSTEM KERNEL COMPROMISED. DO NOT DISCONNECT. TRACING... &lt;&lt;&lt;</div>

  <div class="menu-container">
    <div style="display:flex;flex-direction:row;align-items:center;gap:20px;width:100%;max-width:1240px;">

      <!-- 왼쪽 패널: ACCESS CARD -->
      <canvas id="cardCanvas" style="flex-shrink:0;display:block;"></canvas>

      <!-- 폴더 윈도우 (가운데) -->
      <div class="folder-window">
        <div class="folder-titlebar">
          <span>[ ► SET WORLD DIRECTORY ]</span>
          <span class="titlebar-fill">════════════════════════════════════</span>
          <div class="folder-icons">
            <div class="folder-icon">[_]</div>
            <div class="folder-icon">[□]</div>
            <div class="folder-icon">[✕]</div>
          </div>
        </div>

        <div class="path-bar">
          C:\WORLD\SET\
        </div>

        <div class="folder-content">
          <div class="menu-items">
            <div class="menu-item" onclick="navigate('portfolio.html?section=project')">
              <div class="menu-item-name">SET</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=inclusion')">
              <div class="menu-item-name">SET Inclusion</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=rule')">
              <div class="menu-item-name">entire</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=rule')">
              <div class="menu-item-name">log</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=reference')">
              <div class="menu-item-name">reference</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=archive')">
              <div class="menu-item-name">Archive</div>
            </div>
          </div>
        </div>

        <div class="status-bar">
          <span>7 Files</span>
          <span>ENTER to select • ESC to exit</span>
        </div>
      </div>

      <!-- 캔버스: 레이더(위) + 디코드(아래) (우) -->
      <canvas id="loadingCanvas" style="width:260px;flex-shrink:0;display:block;"></canvas>

    </div><!-- /wrapper -->
  </div>

  <script>
    // ── FILE TREE (우측 패널) ────────────────────────────────────
    (function() {
      const canvas = document.getElementById('loadingCanvas');
      const ctx    = canvas.getContext('2d');
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const W = 260, H = 400;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.scale(dpr, dpr);

      const GA = (a) => `rgba(57,220,0,${a})`;
      let frame = 0;

      const TREE=[
        {name:'C:\\WORLD\\SET\\', depth:0, type:'root',  size:'',        date:'2026-01-15'},
        {name:'PROJECT\\',        depth:1, type:'dir',   size:'4 items', date:'2026-01-14'},
        {name:'0928\\',           depth:2, type:'dir',   size:'87 img',  date:'2025-09-28'},
        {name:'0112\\',           depth:2, type:'dir',   size:'64 img',  date:'2026-01-12'},
        {name:'INCLUSION\\',      depth:1, type:'dir',   size:'3 items', date:'2026-01-10'},
        {name:'ARCHIVE\\',        depth:1, type:'dir',   size:'112 img', date:'2025-08-01'},
        {name:'index.html',       depth:1, type:'file',  size:'42 KB',   date:'2026-01-15'},
        {name:'README.md',        depth:1, type:'file',  size:'2 KB',    date:'2026-01-14'},
      ];

      let typeCmd='', typeCursor=0, typeTarget='';
      const CMD_SEQS=['cd PROJECT\\','ls -la','cd ..','cd INCLUSION\\','cd ..','dir /w'];
      let cmdIdx=0, cmdPhase=0, cmdTimer=0;

      function draw() {
        ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

        const fs=Math.max(9,Math.floor(H*0.027));
        const lh=fs+7;
        const cursor=Math.floor(frame/52)%TREE.length;

        // Typing logic
        cmdTimer++;
        if(cmdPhase===0){
          typeTarget=CMD_SEQS[cmdIdx%CMD_SEQS.length];
          if(cmdTimer%4===0 && typeCursor<typeTarget.length){ typeCmd+=typeTarget[typeCursor++]; }
          if(typeCursor>=typeTarget.length){ cmdPhase=1; cmdTimer=0; }
        } else if(cmdPhase===1){
          if(cmdTimer>40){ cmdPhase=2; cmdTimer=0; }
        } else {
          if(cmdTimer%3===0 && typeCmd.length>0){ typeCmd=typeCmd.slice(0,-1); }
          if(typeCmd.length===0){ cmdPhase=0; typeCursor=0; cmdIdx++; cmdTimer=0; }
        }

        let y=0;
        ctx.textBaseline='top'; ctx.textAlign='left';

        // Title bar
        ctx.fillStyle=GA(0.07); ctx.fillRect(0,0,W,lh+4);
        ctx.font=`bold ${fs}px monospace`; ctx.fillStyle='#39dc00';
        ctx.fillText('[ ► FILE MANAGER ]', 4, 4);
        const now=new Date();
        ctx.fillStyle=GA(0.35); ctx.textAlign='right';
        ctx.fillText(now.toTimeString().slice(0,5), W-4, 4);
        ctx.textAlign='left'; y=lh+8;

        // Path bar
        ctx.font=`${fs-1}px monospace`; ctx.fillStyle=GA(0.38);
        ctx.fillText('PATH> C:\\WORLD\\SET\\', 4, y); y+=lh;
        ctx.fillStyle=GA(0.15); ctx.fillRect(0,y,W,1); y+=5;

        // Column headers
        ctx.font=`${Math.max(7,fs-2)}px monospace`; ctx.fillStyle=GA(0.25);
        ctx.fillText('NAME', 4, y);
        ctx.textAlign='right'; ctx.fillText('SIZE    DATE', W-2, y); ctx.textAlign='left';
        y+=fs+3;
        ctx.fillStyle=GA(0.12); ctx.fillRect(0,y,W,1); y+=4;

        // Tree items
        ctx.font=`${fs}px monospace`;
        const dw=Math.floor(W*0.05);
        TREE.forEach((item,idx)=>{
          const isSel=idx===cursor;
          const indent=item.depth*dw;

          if(isSel){
            ctx.fillStyle=GA(0.125); ctx.fillRect(0,y-2,W,lh);
            ctx.strokeStyle=GA(0.4); ctx.lineWidth=1;
            ctx.strokeRect(0,y-2,W-1,lh);
          }

          // Tree connectors
          for(let d=1;d<=item.depth;d++){
            ctx.strokeStyle=GA(0.16); ctx.lineWidth=1;
            const cx2=3+(d-1)*dw+dw*0.35;
            ctx.beginPath();
            if(d<item.depth){ ctx.moveTo(cx2,y-2); ctx.lineTo(cx2,y+lh); }
            else { ctx.moveTo(cx2,y-2); ctx.lineTo(cx2,y+fs/2); ctx.lineTo(3+indent+1,y+fs/2); }
            ctx.stroke();
          }

          const icon=item.type==='root'?'⊟':item.type==='dir'?(isSel?'▼':'▶'):'·';
          ctx.fillStyle=isSel?'#39dc00':item.type==='file'?GA(0.38):'#39dc00';
          const label=icon+' '+item.name;
          ctx.fillText(label, 3+indent, y);

          // Blinking block cursor
          if(isSel && frame%28<18){
            const tw=ctx.measureText(label).width;
            ctx.fillStyle='#39dc00';
            ctx.fillRect(3+indent+tw+1, y, Math.floor(W*0.038), fs+1);
          }

          // Right: size or date
          ctx.font=`${Math.max(6,fs-2)}px monospace`;
          ctx.fillStyle=isSel?GA(0.6):GA(0.21);
          ctx.textAlign='right';
          if(isSel) ctx.fillText(item.date, W-2, y);
          else if(item.size) ctx.fillText(item.size, W-2, y);
          ctx.textAlign='left';
          ctx.font=`${fs}px monospace`;

          y+=lh;
        });

        // Command line
        ctx.fillStyle=GA(0.12); ctx.fillRect(0,H-lh*2-4,W,1);
        ctx.font=`${fs-1}px monospace`; ctx.fillStyle=GA(0.44);
        ctx.fillText('> '+typeCmd+(frame%24<14?'█':''), 4, H-lh*2+2);

        // Status bar
        ctx.fillStyle=GA(0.07); ctx.fillRect(0,H-lh,W,lh);
        ctx.font=`${Math.max(7,fs-2)}px monospace`; ctx.fillStyle=GA(0.32);
        ctx.fillText(` ${TREE.length} items  [ENT]open  [ESC]back`, 2, H-lh+4);

        frame++;
      }

      setInterval(draw, 40);
    })();
    // ──────────────────────────────────────────────────────────────


    // ── ACCESS CARD (왼쪽 패널) ──────────────────────────────────
    (function() {
      const canvas = document.getElementById('cardCanvas');
      const ctx = canvas.getContext('2d');
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const CW = 240, CH = 400;
      canvas.width = CW * dpr; canvas.height = CH * dpr;
      canvas.style.width = CW + 'px'; canvas.style.height = CH + 'px';
      ctx.scale(dpr, dpr);
      const GA = (a) => `rgba(57,220,0,${a})`;
      let frame = 0;

      function draw() {
        const cw = CW, ch = CH;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cw, ch);

        const t = frame;
        const glitchOn = Math.sin(t * 0.063) > 0.82;
        const hardGlitch = glitchOn && Math.random() > 0.55;
        const fh = Math.max(8, Math.floor(cw * 0.046));
        const mx = 12, my = 10;
        const cw2 = cw - mx*2, ch2 = ch - my*2;

        // Card background
        const cardG = ctx.createLinearGradient(mx, my, mx, my+ch2);
        cardG.addColorStop(0, '#040e07'); cardG.addColorStop(1, '#020809');
        ctx.fillStyle = cardG; ctx.fillRect(mx, my, cw2, ch2);

        // Micro grid
        ctx.strokeStyle = GA(0.035); ctx.lineWidth = 1;
        for (let gx = mx; gx < mx+cw2; gx += 10) { ctx.beginPath(); ctx.moveTo(gx,my); ctx.lineTo(gx,my+ch2); ctx.stroke(); }
        for (let gy = my; gy < my+ch2; gy += 10) { ctx.beginPath(); ctx.moveTo(mx,gy); ctx.lineTo(mx+cw2,gy); ctx.stroke(); }

        // Hologram shimmer band
        const holoY = (t * 2.2) % (ch2 + 80) - 40 + my;
        const holoG = ctx.createLinearGradient(mx, holoY-20, mx+cw2, holoY+45);
        holoG.addColorStop(0, GA(0)); holoG.addColorStop(0.2, 'rgba(57,220,180,0.055)');
        holoG.addColorStop(0.4, 'rgba(80,200,255,0.065)'); holoG.addColorStop(0.6, 'rgba(180,80,255,0.055)');
        holoG.addColorStop(0.8, 'rgba(255,80,0,0.03)'); holoG.addColorStop(1, GA(0));
        ctx.fillStyle = holoG; ctx.fillRect(mx, my, cw2, ch2);

        // HEADER
        const hdrH = 30;
        ctx.fillStyle = GA(0.102); ctx.fillRect(mx, my, cw2, hdrH);
        ctx.fillStyle = '#39dc00'; ctx.fillRect(mx, my, 3, hdrH);

        const ldx = mx+13, ldy = my+hdrH/2;
        ctx.save(); ctx.shadowColor = '#39dc00'; ctx.shadowBlur = 8;
        ctx.fillStyle = glitchOn ? '#ff00ff' : '#39dc00';
        ctx.beginPath(); ctx.moveTo(ldx,ldy-5); ctx.lineTo(ldx+5,ldy); ctx.lineTo(ldx,ldy+5); ctx.lineTo(ldx-5,ldy); ctx.closePath(); ctx.fill();
        ctx.restore();

        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.font = `bold ${fh}px monospace`;
        ctx.fillStyle = glitchOn ? '#ff00ff' : '#39dc00';
        ctx.fillText('SYSTEM ACCESS', mx+22, my+5);
        ctx.font = `${Math.max(6,fh-2)}px monospace`; ctx.fillStyle = GA(0.4);
        ctx.fillText('NOTE-A CREATIVE DIV', mx+22, my+16);

        ctx.fillStyle = '#ff220018'; ctx.fillRect(mx+cw2-38,my+7,33,14);
        ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 1; ctx.strokeRect(mx+cw2-38,my+7,33,14);
        ctx.font = `bold ${fh-1}px monospace`; ctx.fillStyle = '#ff2200';
        ctx.textAlign = 'right'; ctx.fillText('LVL4',mx+cw2-6,my+8); ctx.textAlign = 'left';

        // Divider 1
        const d1 = my+hdrH+6;
        ctx.strokeStyle = GA(0.145); ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(mx,d1); ctx.lineTo(mx+cw2,d1); ctx.stroke();

        // PHOTO
        const phX = mx+9, phY = d1+14;
        const phW = Math.floor(cw2*0.34), phH = Math.floor(ch2*0.28);

        ctx.fillStyle = GA(0.04); ctx.fillRect(phX,phY,phW,phH);
        ctx.strokeStyle = GA(0.33); ctx.lineWidth = 1; ctx.strokeRect(phX,phY,phW,phH);
        const bk = 5;
        ctx.strokeStyle = '#39dc00'; ctx.lineWidth = 1.5;
        [[phX,phY],[phX+phW,phY],[phX,phY+phH],[phX+phW,phY+phH]].forEach(([bx,by],i) => {
          const sx = i%2===0?1:-1, sy = i<2?1:-1;
          ctx.beginPath(); ctx.moveTo(bx+sx*bk,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+sy*bk); ctx.stroke();
        });

        // Noise bg
        const imgD2 = ctx.createImageData(phW, phH);
        for (let i = 0; i < imgD2.data.length; i+=4) {
          const v = Math.floor(Math.random()*12);
          imgD2.data[i]=0; imgD2.data[i+1]=v; imgD2.data[i+2]=0; imgD2.data[i+3]=255;
        }
        ctx.putImageData(imgD2, phX, phY);

        // Silhouette
        const hcx2 = phX+phW/2, hcy2 = phY+phH*0.32;
        const hRx = phW*0.28, hRy = phH*0.22;
        ctx.fillStyle = 'rgba(0,100,0,0.82)';
        ctx.beginPath(); ctx.ellipse(hcx2,hcy2,hRx,hRy,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0,80,0,0.78)';
        ctx.beginPath(); ctx.moveTo(phX,phY+phH);
        ctx.lineTo(phX+phW*0.02,phY+phH*0.68);
        ctx.quadraticCurveTo(phX+phW*0.22,phY+phH*0.6,hcx2-hRx*0.7,hcy2+hRy*0.9);
        ctx.lineTo(hcx2+hRx*0.7,hcy2+hRy*0.9);
        ctx.quadraticCurveTo(phX+phW*0.78,phY+phH*0.6,phX+phW*0.98,phY+phH*0.68);
        ctx.lineTo(phX+phW,phY+phH); ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'rgba(0,90,0,0.75)';
        ctx.fillRect(hcx2-hRx*0.3,hcy2+hRy*0.85,hRx*0.6,phH*0.12);

        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        for (let sl = phY; sl < phY+phH; sl+=2) ctx.fillRect(phX,sl,phW,1);

        ctx.font = `${Math.max(5,fh-5)}px monospace`;
        ctx.fillStyle = frame%30<20 ? '#39dc00' : '#003300';
        ctx.textAlign = 'left'; ctx.fillText('SCAN:OK',phX+2,phY+phH-3);
        ctx.fillStyle = GA(0.33); ctx.textAlign = 'right'; ctx.fillText('99.7%',phX+phW-2,phY+phH-3); ctx.textAlign = 'left';

        ctx.font = `${Math.max(6,fh-4)}px monospace`; ctx.fillStyle = GA(0.31);
        ctx.textAlign = 'center'; ctx.fillText('PHOTO ID',phX+phW/2,phY+phH+7); ctx.textAlign = 'left';

        // INFO FIELDS
        const ix = phX+phW+9, iy = phY;
        const inf = Math.max(7, Math.floor(cw*0.036));
        const flh = inf+7;
        ctx.font = `${inf}px monospace`;
        [['NAME','note-a'],['ID','NA-2026-042'],['ROLE','ARTIST'],['CLR','ADMIN'],['DEPT','WORLD-01'],['ISS','2026.01'],['EXP','2027.01']].forEach(([k,v],i) => {
          ctx.fillStyle = GA(0.26); ctx.fillText(k+':',ix,iy+i*flh);
          ctx.fillStyle = '#39dc00'; ctx.fillText(v,ix+Math.floor(cw*0.19),iy+i*flh);
        });

        // CHIP
        const chipY = phY+phH+24, chipX = phX;
        const chipW = 26, chipH = 20;
        ctx.fillStyle = '#7a6015'; ctx.fillRect(chipX,chipY,chipW,chipH);
        const chipShine = ctx.createLinearGradient(chipX,chipY,chipX,chipY+chipH);
        chipShine.addColorStop(0,'rgba(220,180,60,0.5)'); chipShine.addColorStop(0.5,'rgba(160,120,20,0.2)'); chipShine.addColorStop(1,'rgba(100,70,10,0.4)');
        ctx.fillStyle = chipShine; ctx.fillRect(chipX,chipY,chipW,chipH);
        ctx.strokeStyle = '#c8a035'; ctx.lineWidth = 1; ctx.strokeRect(chipX,chipY,chipW,chipH);
        ctx.strokeStyle = 'rgba(200,160,40,0.5)'; ctx.lineWidth = 0.8;
        for (let cl = chipX+4; cl < chipX+chipW-2; cl+=5) { ctx.beginPath(); ctx.moveTo(cl,chipY+2); ctx.lineTo(cl,chipY+chipH-2); ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(chipX+2,chipY+chipH/3); ctx.lineTo(chipX+chipW-2,chipY+chipH/3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(chipX+2,chipY+chipH*2/3); ctx.lineTo(chipX+chipW-2,chipY+chipH*2/3); ctx.stroke();

        // RFID
        const rfX = chipX+chipW+16, rfY = chipY+chipH/2;
        const rfPhase = (t*0.055)%1;
        [0.25,0.55,0.85].forEach(r => {
          const ar = ((r+rfPhase)%1);
          const a = ar<0.5 ? ar/0.5*0.75 : (1-ar)/0.5*0.75;
          ctx.strokeStyle = GA(a); ctx.lineWidth = 1.3;
          ctx.beginPath(); ctx.arc(rfX,rfY,ar*26,-Math.PI*0.5,Math.PI*0.5); ctx.stroke();
        });
        ctx.font = `${Math.max(6,fh-4)}px monospace`; ctx.fillStyle = GA(0.27);
        ctx.fillText('RFID',rfX+8,rfY-3);

        // HOLOGRAM STAMP
        const holoSX = mx+cw2-20, holoSY = chipY+chipH/2;
        const hShift = (t*0.035)%1;
        ctx.save();
        const hc = ctx.createRadialGradient(holoSX,holoSY,0,holoSX,holoSY,13);
        [[0,'rgba(57,220,120,0.5)'],[0.33,'rgba(80,120,255,0.4)'],[0.66,'rgba(200,0,255,0.4)'],[1,GA(0)]].forEach(([pos,col]) => hc.addColorStop((+pos+hShift)%1,col));
        ctx.fillStyle = hc; ctx.beginPath(); ctx.arc(holoSX,holoSY,13,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(57,220,120,0.5)'; ctx.lineWidth = 0.8; ctx.beginPath(); ctx.arc(holoSX,holoSY,13,0,Math.PI*2); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 0.5;
        for (let a = 0; a < Math.PI; a += Math.PI/4) {
          ctx.beginPath(); ctx.moveTo(holoSX+Math.cos(a+hShift*2)*4,holoSY+Math.sin(a+hShift*2)*4);
          ctx.lineTo(holoSX+Math.cos(a+Math.PI+hShift*2)*4,holoSY+Math.sin(a+Math.PI+hShift*2)*4); ctx.stroke();
        }
        ctx.restore();

        // Divider 2
        const d2 = chipY+chipH+18;
        ctx.strokeStyle = GA(0.102); ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(mx+4,d2); ctx.lineTo(mx+cw2-4,d2); ctx.stroke();

        // BARCODE
        const bcPanY = d2+8, bcX = mx+5, bcW = cw2-10;
        const bcH = Math.floor(ch2*0.088);
        const bcPanH = bcH+30;
        ctx.fillStyle = '#010a02'; ctx.fillRect(bcX,bcPanY,bcW,bcPanH);
        ctx.strokeStyle = GA(0.094); ctx.lineWidth = 1; ctx.strokeRect(bcX,bcPanY,bcW,bcPanH);

        ctx.font = `${Math.max(5,fh-5)}px monospace`; ctx.fillStyle = GA(0.25); ctx.textAlign = 'left';
        ctx.fillText('CODE-128-B',bcX+3,bcPanY+4); ctx.textAlign = 'right';
        ctx.fillText('CHK:C4',bcX+bcW-3,bcPanY+4); ctx.textAlign = 'left';

        const barY = bcPanY+13;
        const C128_START=[2,1,1,4,1,2], C128_STOP=[2,3,3,1,1,1,2];
        const C128_DATA=[[2,2,2,1,1,2],[1,1,2,1,3,2],[1,1,2,3,1,2],[1,3,2,1,1,2],[1,1,2,2,2,2],[2,1,1,2,3,1],[1,2,3,1,1,2],[2,1,2,1,3,1],[1,2,1,3,2,1],[2,3,1,2,1,1],[2,1,3,2,1,1],[1,2,1,1,3,2]];
        const C128_CHECK=[1,2,3,1,2,1];
        const allPat=[...C128_START,...C128_DATA.flat(),...C128_CHECK,...C128_STOP];
        const totW=allPat.reduce((s,v)=>s+v,0), scl=(bcW-10)/totW;

        let bxp2=bcX+5;
        allPat.forEach((w,i)=>{
          if(i%2===0){ const sh=hardGlitch?(Math.random()-.5)*2:0; ctx.fillStyle=glitchOn?'#ff00ff':'#39dc00'; ctx.fillRect(bxp2,barY+sh,w*scl-0.2,bcH); }
          bxp2+=w*scl;
        });

        const sgW=C128_START.reduce((s,v)=>s+v,0)*scl, egW=C128_STOP.reduce((s,v)=>s+v,0)*scl;
        ctx.fillStyle=glitchOn?'rgba(255,0,255,0.6)':GA(0.6);
        ctx.fillRect(bcX+5,barY-4,sgW,3); ctx.fillRect(bcX+5,barY+bcH+1,sgW,3);
        ctx.fillRect(bcX+5+totW*scl-egW,barY-4,egW,3); ctx.fillRect(bcX+5+totW*scl-egW,barY+bcH+1,egW,3);

        ctx.font=`${Math.max(5,fh-4)}px monospace`; ctx.fillStyle=GA(0.27);
        ctx.fillText('◁',bcX+2,barY+bcH*0.55); ctx.textAlign='right'; ctx.fillText('▷',bcX+bcW-2,barY+bcH*0.55); ctx.textAlign='left';

        const scanProgress=((t*0.038)%2);
        const scanFrac=scanProgress<1?scanProgress:2-scanProgress;
        const scanLY=barY+scanFrac*bcH;
        const scanG2=ctx.createLinearGradient(bcX,0,bcX+bcW,0);
        scanG2.addColorStop(0,GA(0)); scanG2.addColorStop(0.08,GA(0.7)); scanG2.addColorStop(0.92,GA(0.7)); scanG2.addColorStop(1,GA(0));
        ctx.fillStyle=scanG2; ctx.fillRect(bcX+3,scanLY-1,bcW-6,2);
        const trailG=ctx.createLinearGradient(0,scanLY-6,0,scanLY);
        trailG.addColorStop(0,GA(0)); trailG.addColorStop(1,GA(0.12));
        ctx.fillStyle=trailG; ctx.fillRect(bcX+3,scanLY-6,bcW-6,6);

        ctx.font=`${Math.max(7,fh-3)}px monospace`; ctx.fillStyle=GA(0.345); ctx.textAlign='center';
        ctx.fillText('4E5C  A92D  7F31  0842',bcX+bcW/2,barY+bcH+12); ctx.textAlign='left';
        ctx.font=`${Math.max(5,fh-5)}px monospace`; ctx.fillStyle=GA(0.157);
        ctx.fillText('NOTE-A · SET PROJECT · 2026',bcX+3,bcPanY+bcPanH-3);

        // Divider 3
        const d3=bcPanY+bcPanH+6;
        ctx.strokeStyle=GA(0.083); ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(mx+4,d3); ctx.lineTo(mx+cw2-4,d3); ctx.stroke();

        // STATUS BAR
        const stY=d3+7;
        const authPhase=Math.floor(t/50)%7;
        if(authPhase<5){
          const blink=t%24<16;
          ctx.fillStyle=blink?GA(0.125):GA(0.047); ctx.fillRect(mx+7,stY-2,cw2-14,19);
          ctx.strokeStyle=blink?GA(0.376):GA(0.188); ctx.lineWidth=1; ctx.strokeRect(mx+7,stY-2,cw2-14,19);
          ctx.save(); ctx.shadowColor='#39dc00'; ctx.shadowBlur=blink?6:0;
          ctx.font=`bold ${fh}px monospace`; ctx.fillStyle=blink?'#39dc00':GA(0.33);
          ctx.fillText('◆ AUTHORIZED',mx+13,stY); ctx.restore();
        } else {
          const dots='.'.repeat(Math.floor(t/10)%4);
          ctx.fillStyle='#ff220018'; ctx.fillRect(mx+7,stY-2,cw2-14,19);
          ctx.strokeStyle='#ff220055'; ctx.lineWidth=1; ctx.strokeRect(mx+7,stY-2,cw2-14,19);
          ctx.font=`bold ${fh}px monospace`; ctx.fillStyle='#ff4400';
          ctx.fillText('◇ VERIFYING'+dots,mx+13,stY);
        }

        const ledOn=t%60<42;
        ctx.save(); ctx.shadowColor='#39dc00'; ctx.shadowBlur=ledOn?14:0;
        ctx.fillStyle=ledOn?'#39dc00':'#001800';
        ctx.beginPath(); ctx.arc(mx+cw2-10,stY+8,4,0,Math.PI*2); ctx.fill(); ctx.restore();

        // OUTER GLOW BORDER
        ctx.save(); ctx.shadowColor=glitchOn?'#ff00ff':'#39dc00'; ctx.shadowBlur=14;
        ctx.strokeStyle=glitchOn?'#ff00ff':'#39dc00'; ctx.lineWidth=1.5; ctx.strokeRect(mx,my,cw2,ch2); ctx.restore();
        ctx.setLineDash([3,5]); ctx.strokeStyle=GA(0.118); ctx.lineWidth=1;
        ctx.strokeRect(mx+3,my+3,cw2-6,ch2-6); ctx.setLineDash([]);

        // SCAN LINE
        const scanY=((t*1.9)%(ch+60))-30;
        const scG=ctx.createLinearGradient(0,scanY-9,0,scanY+9);
        scG.addColorStop(0,'transparent'); scG.addColorStop(0.5,GA(0.13)); scG.addColorStop(1,'transparent');
        ctx.fillStyle=scG; ctx.fillRect(0,scanY-9,cw,18);

        // HARD GLITCH
        if(hardGlitch){
          const gy=Math.random()*ch, gh=4+Math.random()*18;
          if(gy+gh<ch){ const d=ctx.getImageData(0,gy,cw,gh); ctx.putImageData(d,(Math.random()-.5)*30,gy); }
          ctx.save(); ctx.globalAlpha=0.32; ctx.globalCompositeOperation='screen';
          ctx.fillStyle='#ff0000'; ctx.fillRect(4,Math.random()*ch,cw,3);
          ctx.fillStyle='#0000ff'; ctx.fillRect(-4,Math.random()*ch,cw,3); ctx.restore();
        }

        frame++;
      }

      setInterval(draw, 40);
    })();
    // ──────────────────────────────────────────────────────────────

    function navigate(path) {
      window.location.href = path;
    }

    // ESC 키로 나가기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        window.location.href = 'index.html';
      }
    });

    // 엔터 키로 선택된 항목 실행
    let selectedIndex = 0;
    const items = document.querySelectorAll('.menu-item');

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % items.length;
        updateSelection();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateSelection();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        items[selectedIndex].click();
      }
    });

    function updateSelection() {
      items.forEach((item, idx) => {
        item.classList.toggle('selected', idx === selectedIndex);
      });
      items[selectedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 초기 선택
    updateSelection();
  </script>
</body>
</html>
