<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET - MENU</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #000; color: #39dc00; font-family: 'Courier New', monospace; height: 100%; overflow: hidden; }

.top-banner {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 32px;
  background: #000; border-bottom: 2px dashed #ff3333; color: #ff3333;
  padding: 6px 0; z-index: 999; overflow: hidden;
  animation: marquee 12s linear infinite;
  font-size: 12px;
}

@keyframes marquee { 0% { text-indent: 100vw; } 100% { text-indent: -150vw; } }

.menu-container {
  display: flex; justify-content: center; align-items: center;
  width: 100%; height: calc(100vh - 32px);
  margin-top: 32px;
  padding: 20px;
  position: relative; z-index: 1;
  overflow: hidden;
}

.folder-window {
  border-top: 2px solid #7fff4f;
  border-left: 2px solid #7fff4f;
  border-bottom: 2px solid #1a5500;
  border-right: 2px solid #1a5500;
  background: #000;
  width: 340px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 20px rgba(57,220,0,0.2), inset 1px 1px 0 rgba(150,255,80,0.12), inset -1px -1px 0 rgba(0,0,0,0.5);
}

.folder-titlebar {
  background: #39dc00;
  color: #000;
  padding: 6px 10px;
  font-weight: bold;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.folder-icons {
  display: flex;
  gap: 4px;
}

.folder-icon {
  width: 16px;
  height: 16px;
  background: #39dc00;
  border: 1px solid #000;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
}

.folder-content {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  background: #000;
  color: #39dc00;
  font-size: 12px;
  line-height: 1.8;
  border-top: 1px solid #39dc00;
}

.path-bar {
  padding: 8px 12px;
  border-bottom: 1px solid #39dc00;
  background: #000;
  color: #39dc00;
  font-size: 11px;
  border-top: 1px solid #39dc00;
}

.menu-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.menu-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 12px;
  cursor: pointer;
  transition: all 0.1s;
  border-top: 2px solid #7fff4f;
  border-left: 2px solid #7fff4f;
  border-bottom: 2px solid #1a5500;
  border-right: 2px solid #1a5500;
  background: #000;
  text-align: center;
  min-height: 80px;
}

.menu-item:hover {
  background: #39dc00;
  color: #000;
  border: 1px solid #39dc00;
}

.menu-item-icon {
  margin-bottom: 8px;
  width: 100%;
  text-align: center;
  font-size: 20px;
}

.menu-item-name {
  flex: 1;
  word-break: break-all;
  font-size: 13px;
  font-weight: bold;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #000;
  border-left: 1px solid #39dc00;
}

::-webkit-scrollbar-thumb {
  background: #39dc00;
}

::-webkit-scrollbar-thumb:hover {
  background: #ff9900;
}

.status-bar {
  padding: 8px 12px;
  border-top: 1px solid #39dc00;
  background: #000;
  color: #39dc00;
  font-size: 11px;
  display: flex;
  justify-content: space-between;
  text-align: center;
}

@media (max-width: 768px) {
  .folder-window {
    max-width: 95vw;
  }

  .folder-content {
    font-size: 11px;
  }

  .menu-item {
    padding: 6px 10px;
  }
}

  </style>
</head>
<body>
  <div class="top-banner">&gt;&gt;&gt; FATAL_BREACH_DETECTED : SYSTEM KERNEL COMPROMISED. DO NOT DISCONNECT. TRACING... &lt;&lt;&lt;</div>

  <div class="menu-container">
    <div style="display:flex;flex-direction:row;align-items:flex-start;gap:20px;width:100%;max-width:940px;">

      <!-- 폴더 윈도우 (좌) -->
      <div class="folder-window">
        <div class="folder-titlebar">
          SET WORLD DIRECTORY
          <div class="folder-icons">
            <div class="folder-icon">_</div>
            <div class="folder-icon">□</div>
            <div class="folder-icon">✕</div>
          </div>
        </div>

        <div class="path-bar">
          C:\WORLD\SET\
        </div>

        <div class="folder-content">
          <div class="menu-items">
            <div class="menu-item" onclick="navigate('portfolio.html?section=project')">
              <div class="menu-item-name">SET</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=inclusion')">
              <div class="menu-item-name">SET Inclusion</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=rule')">
              <div class="menu-item-name">entire</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=rule')">
              <div class="menu-item-name">log</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=reference')">
              <div class="menu-item-name">reference</div>
            </div>
            <div class="menu-item" onclick="navigate('portfolio.html?section=archive')">
              <div class="menu-item-name">Archive</div>
            </div>
          </div>
        </div>

        <div class="status-bar">
          <span>7 Files</span>
          <span>ENTER to select • ESC to exit</span>
        </div>
      </div>

      <!-- 캔버스: 레이더(위) + 디코드(아래) (우) -->
      <canvas id="loadingCanvas" style="width:260px;flex-shrink:0;display:block;"></canvas>

    </div><!-- /wrapper -->
  </div>

  <script>
    // ── 레이더 + 디코드 합성 애니메이션 ────────────────────────────
    (function() {
      const canvas = document.getElementById('loadingCanvas');
      const ctx    = canvas.getContext('2d');
      let W, H;

      // ── 레이더 상태 ──
      let radarAngle = 0, radarTick = 0, radarInterference = 0;
      let radarBlips = [];
      function initBlips() {
        radarBlips = [
          { angle:0.52, dist:0.55, label:'TGT-01', locked:true,  life:0, maxLife:140, vx:0.002,  vy:0.001  },
          { angle:1.80, dist:0.38, label:'TGT-02', locked:false, life:0, maxLife:110, vx:-0.001, vy:0.002  },
          { angle:3.40, dist:0.70, label:'OBJ-A',  locked:false, life:0, maxLife:90,  vx:0.003,  vy:-0.001 },
          { angle:4.90, dist:0.28, label:'TGT-03', locked:false, life:0, maxLife:120, vx:-0.002, vy:-0.002 },
          { angle:5.60, dist:0.62, label:'UNK',    locked:false, life:0, maxLife:80,  vx:0.001,  vy:0.003  },
          { angle:2.30, dist:0.82, label:'OBJ-B',  locked:false, life:0, maxLife:100, vx:-0.003, vy:0.001  },
        ];
      }

      // ── 디코드 상태 ──
      const DEC_NOISE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*?/\\|<>!~^';
      const DEC_HEX   = '0123456789ABCDEF';
      const DEC_MSGS  = [
        { text: 'SET WORLD DIRECTORY',      corrupt: false },
        { text: 'ACCESSING FILES...',       corrupt: false },
        { text: '>>> AUTH: RESTRICTED',     corrupt: false },
        { text: 'C:\\WORLD\\SET\\',         corrupt: false },
        { text: 'KERNEL INTEGRITY: OK',     corrupt: false },
        { text: '%%% SECTOR FAULT',         corrupt: true  },
        { text: 'DECRYPTING PAYLOAD...',    corrupt: false },
      ];
      let decLines = [], decTick = 0;
      function rndHex() { return DEC_HEX[Math.floor(Math.random()*16)] + DEC_HEX[Math.floor(Math.random()*16)]; }
      function rndNoise() { return DEC_NOISE[Math.floor(Math.random()*DEC_NOISE.length)]; }
      function mkLine(li) {
        const cfg = DEC_MSGS[li % DEC_MSGS.length];
        return { target: cfg.text, corrupt: cfg.corrupt,
          chars: Array.from({length: cfg.text.length}, rndHex),
          stage: 0, t: 0, startT: li * 22, done: false, glitch: 0 };
      }
      function initDec() {
        decTick = 0;
        decLines = DEC_MSGS.map((_, i) => mkLine(i));
      }

      const RADAR_H = 220;   // 레이더 존 높이
      const DECODE_Y = 225;  // 디코드 존 시작 y

      function resize() {
        W = canvas.width  = 260;
        H = canvas.height = 400;
      }

      // ── 레이더 그리기 (상단 전폭) ──
      function drawRadar() {
        const cx = W / 2;
        const cy = RADAR_H / 2;
        const R  = Math.min(W / 2 - 30, RADAR_H / 2 - 30);
        radarTick++;

        // 동심원
        [0.33, 0.66, 1].forEach((s, i) => {
          ctx.strokeStyle = `rgba(57,220,0,${0.1 + i*0.06})`;
          ctx.lineWidth = 0.7;
          ctx.beginPath(); ctx.arc(cx, cy, R*s, 0, Math.PI*2); ctx.stroke();
        });
        // 십자선
        ctx.strokeStyle = 'rgba(57,220,0,0.1)'; ctx.lineWidth = 0.5;
        [0, Math.PI/4, Math.PI/2, Math.PI*3/4].forEach(a => {
          ctx.beginPath();
          ctx.moveTo(cx+Math.cos(a)*R, cy+Math.sin(a)*R);
          ctx.lineTo(cx-Math.cos(a)*R, cy-Math.sin(a)*R);
          ctx.stroke();
        });
        // 스윕 꼬리
        const TAIL = Math.PI / 3.5;
        for (let i = 0; i < 40; i++) {
          const a = radarAngle - (i/40)*TAIL;
          ctx.strokeStyle = `rgba(57,220,0,${Math.pow(1-i/40,1.5)*0.5})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.moveTo(cx, cy);
          ctx.lineTo(cx+Math.cos(a)*R, cy+Math.sin(a)*R); ctx.stroke();
        }
        ctx.strokeStyle = '#7fff7f'; ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(cx, cy);
        ctx.lineTo(cx+Math.cos(radarAngle)*R, cy+Math.sin(radarAngle)*R); ctx.stroke();

        // 블립
        radarBlips.forEach(b => {
          b.angle += b.vx; b.dist += b.vy;
          if (b.dist < 0.1 || b.dist > 0.95) b.vy *= -1;
          const da = ((radarAngle-b.angle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
          if (da < 0.07 || da > Math.PI*2-0.07) b.life = b.maxLife;
          if (b.life <= 0) return;
          const alpha = b.life / b.maxLife;
          const bx = cx + Math.cos(b.angle)*R*b.dist;
          const by = cy + Math.sin(b.angle)*R*b.dist;
          if (b.locked) {
            const pulse = Math.sin(radarTick*0.15)*0.5+0.5;
            ctx.strokeStyle = `rgba(100,255,100,${alpha*pulse})`; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(bx, by, 6+pulse*4, 0, Math.PI*2); ctx.stroke();
            ctx.strokeStyle = `rgba(100,255,100,${alpha})`; ctx.lineWidth = 1.2;
            const d = 4;
            ctx.beginPath(); ctx.moveTo(bx,by-d); ctx.lineTo(bx+d,by);
            ctx.lineTo(bx,by+d); ctx.lineTo(bx-d,by); ctx.closePath(); ctx.stroke();
          } else {
            ctx.fillStyle = `rgba(100,255,100,${alpha*0.85})`;
            ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI*2); ctx.fill();
          }
          b.life--;
        });

        // NSEW
        ctx.fillStyle = 'rgba(57,220,0,0.45)'; ctx.font = 'bold 7px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('N', cx, cy-R-3); ctx.fillText('S', cx, cy+R+10);
        ctx.textAlign = 'left';
        ctx.fillText('E', cx+R+3, cy+3); ctx.fillText('W', cx-R-9, cy+3);

        // BRG / TGT
        const brg = ((radarAngle*180/Math.PI)%360+360)%360;
        ctx.fillStyle = 'rgba(57,220,0,0.5)'; ctx.font = '7px Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(`BRG:${brg.toFixed(0).padStart(4)}°`, 4, 10);
        ctx.fillText(`TGT:${radarBlips.filter(b=>b.life>0).length}`, 4, 20);

        // 인터퍼런스
        if (Math.random() < 0.04) radarInterference = 6;
        if (radarInterference > 0) {
          ctx.fillStyle = `rgba(57,220,0,${Math.random()*0.25})`;
          ctx.fillRect(0, Math.random()*RADAR_H, W, 1);
          radarInterference--;
        }

        radarAngle += 0.035;
      }

      // ── 디코드 그리기 (하단 전체 폭) ──
      function drawDecode() {
        decTick++;
        const PX   = 8.8;
        const DY   = DECODE_Y;           // 시작 y
        const DH   = H - DY;             // 사용 가능 높이
        const lineH = 18;

        decLines.forEach((line, li) => {
          line.t++;
          if (line.t < line.startT) return;
          const elapsed = line.t - line.startT;
          if (line.stage===0 && elapsed>18) { line.stage=1; line.chars=Array.from({length:line.target.length},rndNoise); }
          if (line.stage===1 && elapsed>40) line.stage=2;
          if (line.stage===0 && decTick%2===0) line.chars[Math.floor(Math.random()*line.target.length)]=rndHex();
          else if (line.stage===1 && decTick%2===0) line.chars[Math.floor(Math.random()*line.target.length)]=rndNoise();
          else if (line.stage===2) {
            const progress = (elapsed-40)/(line.target.length*3.5+20);
            line.target.split('').forEach((ch,i)=>{
              if (line.chars[i]===ch) return;
              if (i/line.target.length<progress) line.chars[i]=line.corrupt&&Math.random()<0.15?rndNoise():ch;
              else if (decTick%3===0) line.chars[i]=rndNoise();
            });
            if (progress>1.2&&!line.done){line.stage=3;line.done=true;}
          }
          if (Math.random()<(line.corrupt?0.04:0.008)) line.glitch=3;
          if (line.glitch>0){line.chars[Math.floor(Math.random()*line.target.length)]=rndNoise();line.glitch--;}
          if (line.done&&elapsed>line.target.length*4+120) Object.assign(line,mkLine(li));

          const y = DY + 12 + lineH*li + lineH*0.7;
          const prefix = line.done?(line.corrupt?'[ERR]':'[OK] '):`[${String(li).padStart(2,'0')}] `;
          ctx.font='8px Courier New';
          ctx.fillStyle=line.corrupt?'rgba(255,80,80,0.7)':line.done?'rgba(57,220,0,0.5)':'rgba(57,220,0,0.3)';
          ctx.textAlign='left';
          ctx.fillText(prefix, 8, y);

          ctx.font='bold 9px Courier New';
          line.chars.forEach((ch,i)=>{
            const isDone=ch===line.target[i];
            let color;
            if (isDone&&line.corrupt) color=`rgba(255,100,100,${0.6+Math.random()*0.4})`;
            else if (isDone)          color=`rgba(57,220,0,${0.8+Math.random()*0.2})`;
            else if (line.stage===0)  color=`rgba(57,180,0,${0.3+Math.random()*0.3})`;
            else                      color=`rgba(57,220,0,${0.2+Math.random()*0.3})`;
            ctx.fillStyle=color;
            ctx.fillText(line.stage===0?ch[0]||ch:ch, 46+i*PX, y);
          });

          if (line.stage===2&&!line.done) {
            const cur=line.chars.findIndex((c,i)=>c!==line.target[i]&&line.target[i]!==' ');
            if (cur!==-1&&Math.floor(Date.now()/150)%2===0){
              ctx.fillStyle=line.corrupt?'#ff6060':'#fff';
              ctx.fillRect(46+cur*PX-1, y-9, 7, 10);
            }
          }
        });

        // 디코드 헤더
        ctx.fillStyle='rgba(57,220,0,0.35)'; ctx.font='7px Courier New';
        ctx.textAlign='left';
        ctx.fillText('DECRYPT v2.4', 8, DY+9);
        const done=decLines.filter(l=>l.done&&!l.corrupt).length;
        ctx.textAlign='right';
        ctx.fillText(`${done}/${decLines.length} OK`, W-4, DY+9);
        ctx.textAlign='left';
      }

      // ── 메인 드로우 ──
      function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.14)';
        ctx.fillRect(0, 0, W, H);

        drawRadar();
        drawDecode();

        // 레이더/디코드 경계 수평선
        ctx.strokeStyle = 'rgba(57,220,0,0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath(); ctx.moveTo(8, DECODE_Y); ctx.lineTo(W-8, DECODE_Y); ctx.stroke();
        ctx.setLineDash([]);

        // 스캔라인
        for (let y = 0; y < H; y += 2) {
          ctx.fillStyle = 'rgba(0,0,0,0.07)';
          ctx.fillRect(0, y, W, 1);
        }
      }

      initBlips();
      initDec();
      resize();
      window.addEventListener('resize', () => { resize(); });
      setInterval(draw, 40);
    })();
    // ──────────────────────────────────────────────────────────────

    function navigate(path) {
      window.location.href = path;
    }

    // ESC 키로 나가기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        window.location.href = 'index.html';
      }
    });

    // 엔터 키로 선택된 항목 실행
    let selectedIndex = 0;
    const items = document.querySelectorAll('.menu-item');

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % items.length;
        updateSelection();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateSelection();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        items[selectedIndex].click();
      }
    });

    function updateSelection() {
      items.forEach((item, idx) => {
        if (idx === selectedIndex) {
          item.style.background = '#39dc00';
          item.style.color = '#000';
        } else {
          item.style.background = 'transparent';
          item.style.color = '#39dc00';
        }
      });
      items[selectedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 초기 선택
    updateSelection();
  </script>
</body>
</html>
