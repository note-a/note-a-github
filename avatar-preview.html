<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000; color:#00ff00;
      font-family:'Press Start 2P',monospace;
      padding:36px 24px;
      display:flex; flex-direction:column; align-items:center; gap:40px;
    }
    h1 { font-size:9px; letter-spacing:2px;
      text-shadow:1px 0.5px rgba(255,0,0,0.4),-1px -0.5px rgba(0,255,255,0.35); }
    .grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      width:100%; max-width:980px;
    }
    .cell { display:flex; flex-direction:column; gap:8px; align-items:center; }
    .tag  { font-size:5.5px; color:rgba(0,255,0,0.35); letter-spacing:1px; }
    .name { font-size:7px; color:#00ff00; }
    canvas {
      display:block;
      border-top:2px solid #80ff80;
      border-left:2px solid #80ff80;
      border-bottom:2px solid #003300;
      border-right:2px solid #003300;
      box-shadow:0 0 10px rgba(0,255,0,0.5),0 0 28px rgba(0,255,0,0.15);
    }
  </style>
</head>
<body>
<h1>▶ AVATAR STYLE PREVIEW</h1>

<div class="grid">
  <div class="cell"><div class="tag">① PIXEL ART</div><div class="name">8-BIT BUST</div><canvas id="c1" width="220" height="140"></canvas></div>
  <div class="cell"><div class="tag">② LOW-POLY</div><div class="name">GEO BUST</div><canvas id="c2" width="220" height="140"></canvas></div>
  <div class="cell"><div class="tag">③ WIREFRAME</div><div class="name">3D HEAD SCAN</div><canvas id="c3" width="220" height="140"></canvas></div>
  <div class="cell"><div class="tag">④ ASCII</div><div class="name">CHAR RENDER</div><canvas id="c4" width="220" height="140"></canvas></div>
  <div class="cell"><div class="tag">⑤ GLITCH</div><div class="name">CORRUPTED ID</div><canvas id="c5" width="220" height="140"></canvas></div>
  <div class="cell"><div class="tag">⑥ SILHOUETTE</div><div class="name">SHADOW BUST</div><canvas id="c6" width="220" height="140"></canvas></div>
  <div class="cell"><div class="tag">⑦ MATRIX</div><div class="name">DATA STREAM</div><canvas id="c7" width="220" height="140"></canvas></div>
  <div class="cell"><div class="tag">⑧ HOLOGRAM</div><div class="name">HOLO BUST</div><canvas id="c8" width="220" height="140"></canvas></div>
</div>

<script>
setTimeout(()=>{

// ════════════════════════════════════
// ① 픽셀 아트 — 상반신 버스트
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c1'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;

  // 16col × 13row 상반신 — 눈 하이라이트, 코, 개선된 입
  const MAP=[
    '0002222222220000', // hair top
    '0022111111220000', // hair + face
    '0021351313520000', // eyes with highlight (5=반짝임) col 5,10
    '0021351313520000', // eyes
    '0021111111120000', // face
    '0021181118112000', // nose (8=코) col 5,9
    '0021111111120000', // face
    '0021114444112000', // mouth wider (4) col 6-9
    '0021111111120000', // face
    '0002211122000000', // 좁아지는 턱
    '0000011110000000', // 목
    '0006666666600000', // 칼라/어깨 상단
    '0660000000006600', // 어깨
    '6600000000000660', // 어깨 하단
  ];
  const COLOR={'1':'#005500','2':'#001a00','3':'#000d00','4':'#00ff44','5':'#80ff80','6':'#003800','8':'#004400'};
  const PS=8;
  const offX=Math.floor((W-16*PS)/2); // (220-128)/2=46
  const offY=Math.floor((H-13*PS)/2); // (140-104)/2=18

  function draw(){
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    for(let i=0;i<20;i++){
      ctx.fillStyle=`rgba(0,70,0,${Math.random()*0.05})`;
      ctx.fillRect(Math.random()*W,Math.random()*H,2,1);
    }
    MAP.forEach((row,ry)=>{
      [...row].forEach((cell,rx)=>{
        if(cell==='0') return;
        const flicker=(cell==='1')&&Math.random()>0.97;
        ctx.fillStyle=flicker?'#80ff80':(COLOR[cell]||'#004400');
        ctx.fillRect(offX+rx*PS,offY+ry*PS,PS-1,PS-1);
      });
    });
    const sy=(tick*1.5)%(H+10)-5;
    const sg=ctx.createLinearGradient(0,sy-6,0,sy+6);
    sg.addColorStop(0,'rgba(0,255,0,0)'); sg.addColorStop(0.5,'rgba(0,255,0,0.15)'); sg.addColorStop(1,'rgba(0,255,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,sy-6,W,12);
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center';
    ctx.fillText('PIXEL-ID-001',W/2,H-4);
    tick++;
  }
  setInterval(draw,50);
})();


// ════════════════════════════════════
// ② 로우폴리 — 상반신 버스트
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c2'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;
  const cx=W/2;

  // 얼굴 중심 Y: 52, 어깨 Y: 105~130
  const tris=[
    // 이마
    {pts:[[cx,8],[cx-30,28],[cx+30,28]], shade:0.28},
    // 왼쪽 얼굴 위
    {pts:[[cx-30,28],[cx-36,56],[cx,40]], shade:0.48},
    // 오른쪽 얼굴 위
    {pts:[[cx+30,28],[cx+36,56],[cx,40]], shade:0.58},
    // 왼쪽 얼굴 아래
    {pts:[[cx-36,56],[cx-20,85],[cx,68]], shade:0.42},
    // 오른쪽 얼굴 아래
    {pts:[[cx+36,56],[cx+20,85],[cx,68]], shade:0.52},
    // 턱
    {pts:[[cx-20,85],[cx+20,85],[cx,96]], shade:0.44},
    // 목 왼쪽
    {pts:[[cx-10,92],[cx-8,108],[cx,105]], shade:0.32},
    // 목 오른쪽
    {pts:[[cx+10,92],[cx+8,108],[cx,105]], shade:0.38},
    // 왼쪽 어깨 상단
    {pts:[[cx-8,105],[cx-55,115],[cx-30,125]], shade:0.38},
    {pts:[[cx-8,105],[cx-30,125],[cx,125]], shade:0.33},
    // 오른쪽 어깨 상단
    {pts:[[cx+8,105],[cx+55,115],[cx+30,125]], shade:0.46},
    {pts:[[cx+8,105],[cx+30,125],[cx,125]], shade:0.40},
    // 가슴 중앙
    {pts:[[cx-30,125],[cx+30,125],[cx,140]], shade:0.28},
    // 왼쪽 어깨 하단
    {pts:[[cx-55,115],[cx-80,135],[cx-30,125]], shade:0.30},
    {pts:[[cx+55,115],[cx+80,135],[cx+30,125]], shade:0.36},
    // 눈 (isEye)
    {pts:[[cx-24,44],[cx-14,40],[cx-18,54]], shade:0.12, isEye:true},
    {pts:[[cx+24,44],[cx+14,40],[cx+18,54]], shade:0.12, isEye:true},
    // 코
    {pts:[[cx-5,62],[cx+5,62],[cx,75]], shade:0.36},
    // 입
    {pts:[[cx-14,82],[cx+14,82],[cx,91]], shade:0.82, isMouth:true},
  ];

  function draw(){
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    for(let i=0;i<15;i++){
      ctx.fillStyle=`rgba(0,50,0,${Math.random()*0.04})`;
      ctx.fillRect(Math.random()*W,Math.random()*H,2,1);
    }
    const pulse=0.85+Math.sin(tick*0.04)*0.15;
    tris.forEach(tri=>{
      ctx.beginPath();
      ctx.moveTo(tri.pts[0][0],tri.pts[0][1]);
      ctx.lineTo(tri.pts[1][0],tri.pts[1][1]);
      ctx.lineTo(tri.pts[2][0],tri.pts[2][1]);
      ctx.closePath();
      const s=tri.shade*pulse;
      if(tri.isEye)       ctx.fillStyle=`rgba(0,${Math.floor(s*60)},0,0.95)`;
      else if(tri.isMouth) ctx.fillStyle=`rgba(0,${Math.floor(255*s)},${Math.floor(40*s)},0.9)`;
      else                 ctx.fillStyle=`rgba(0,${Math.floor(190*s)},0,0.85)`;
      ctx.fill();
      ctx.strokeStyle='rgba(0,255,0,0.28)'; ctx.lineWidth=0.8; ctx.stroke();
    });
    // 눈 글로우
    [[cx-19,47],[cx+19,47]].forEach(([ex,ey])=>{
      ctx.save(); ctx.shadowColor='#00ff00'; ctx.shadowBlur=8+Math.sin(tick*0.06)*4;
      ctx.fillStyle='rgba(0,255,100,0.9)';
      ctx.beginPath(); ctx.arc(ex,ey,3,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center';
    ctx.fillText('POLY-ID-002',W/2,H-4);
    tick++;
  }
  setInterval(draw,40);
})();


// ════════════════════════════════════
// ③ 와이어프레임 3D 두상 + 어깨선
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c3'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;
  const cx=W/2, headCy=H*0.36; // 머리 중심 약간 위쪽

  const RINGS=7, SEGS=12;
  function getSphere(rx,ry){
    const pts=[];
    for(let i=0;i<=RINGS;i++){
      const phi=(i/RINGS)*Math.PI;
      for(let j=0;j<SEGS;j++){
        const theta=(j/SEGS)*Math.PI*2;
        let x=Math.sin(phi)*Math.cos(theta)*36;
        let y=-Math.cos(phi)*45+4;
        let z=Math.sin(phi)*Math.sin(theta)*32;
        const nx=x*Math.cos(ry)+z*Math.sin(ry);
        const nz=-x*Math.sin(ry)+z*Math.cos(ry);
        x=nx; z=nz;
        const ny2=y*Math.cos(rx)-z*Math.sin(rx);
        const nz2=y*Math.sin(rx)+z*Math.cos(rx);
        y=ny2; z=nz2;
        const fov=240/(z+200);
        pts.push([x*fov+cx, y*fov+headCy, z]);
      }
    }
    return pts;
  }

  const off=document.createElement('canvas'); off.width=W; off.height=H;
  const octx=off.getContext('2d');
  octx.fillStyle='#000'; octx.fillRect(0,0,W,H);

  function draw(){
    octx.fillStyle='rgba(0,0,0,0.18)'; octx.fillRect(0,0,W,H);
    const ry=tick*0.015, rx=Math.sin(tick*0.007)*0.28;
    const pts=getSphere(rx,ry);
    // 위도선
    for(let i=0;i<=RINGS;i++){
      for(let j=0;j<SEGS;j++){
        const p=pts[i*SEGS+j], np=pts[i*SEGS+(j+1)%SEGS];
        const a=Math.max(0.07,(p[2]+100)/200*0.7);
        octx.strokeStyle=`rgba(0,255,80,${a})`; octx.lineWidth=1.5;
        octx.beginPath(); octx.moveTo(p[0],p[1]); octx.lineTo(np[0],np[1]); octx.stroke();
      }
    }
    // 경도선
    for(let j=0;j<SEGS;j++){
      for(let i=0;i<RINGS;i++){
        const p=pts[i*SEGS+j], np=pts[(i+1)*SEGS+j];
        const a=Math.max(0.07,(p[2]+100)/200*0.7);
        octx.strokeStyle=`rgba(0,255,80,${a})`; octx.lineWidth=1.5;
        octx.beginPath(); octx.moveTo(p[0],p[1]); octx.lineTo(np[0],np[1]); octx.stroke();
      }
    }

    // 어깨+목 와이어
    const neckTop=headCy+45, neckBot=H*0.72, shoulderY=H*0.82;
    const alpha=0.45+Math.sin(tick*0.04)*0.15;
    octx.strokeStyle=`rgba(0,255,80,${alpha})`; octx.lineWidth=1.5;
    // 목 왼쪽
    octx.beginPath(); octx.moveTo(cx-10,neckTop); octx.lineTo(cx-10,neckBot); octx.stroke();
    // 목 오른쪽
    octx.beginPath(); octx.moveTo(cx+10,neckTop); octx.lineTo(cx+10,neckBot); octx.stroke();
    // 목 횡선
    octx.beginPath(); octx.moveTo(cx-10,neckBot); octx.lineTo(cx+10,neckBot); octx.stroke();
    // 어깨 왼쪽
    octx.beginPath();
    octx.moveTo(cx-10,neckBot);
    octx.bezierCurveTo(cx-28,neckBot+4, cx-55,shoulderY, cx-88,shoulderY+8);
    octx.stroke();
    // 어깨 오른쪽
    octx.beginPath();
    octx.moveTo(cx+10,neckBot);
    octx.bezierCurveTo(cx+28,neckBot+4, cx+55,shoulderY, cx+88,shoulderY+8);
    octx.stroke();
    // 가슴 중앙 횡선
    octx.beginPath(); octx.moveTo(cx-10,neckBot); octx.lineTo(cx+10,neckBot); octx.stroke();

    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(off,0,0);
    const scanY=(tick*2)%(H+20)-10;
    const sg=ctx.createLinearGradient(0,scanY-8,0,scanY+8);
    sg.addColorStop(0,'rgba(0,255,0,0)'); sg.addColorStop(0.5,'rgba(0,255,0,0.12)'); sg.addColorStop(1,'rgba(0,255,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,scanY-8,W,16);
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center';
    ctx.fillText('WIRE-ID-003',W/2,H-4);
    tick++;
  }
  setInterval(draw,30);
})();


// ════════════════════════════════════
// ④ ASCII 상반신
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c4'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;

  // 얼굴+어깨선 (22 wide × 12 rows)
  const FACE=[
    '    .-----------.',
    '   /  @       @  \\',
    '  | .----------. |',
    '  | |  ======  | |',
    '  | `----------` |',
    '  |    /    \\   |',
    '   \\  | \\__/ |  /',
    '    `-.-------.-`',
    '         |||      ',
    '   .-----|||----.',
    '  /       |||    \\',
    ' /_______________\\',
  ];
  const GLITCH='!@#$%^&*<>[]{}|?';

  function draw(){
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    const FS=8, LH=11;
    const startY=Math.floor((H-FACE.length*LH)/2)+LH;
    ctx.font=`${FS}px 'Press Start 2P',monospace`;
    ctx.textAlign='left';
    FACE.forEach((line,i)=>{
      const y=startY+i*LH;
      const lineW=line.length*FS*0.6;
      const startX=(W-lineW)/2;
      [...line].forEach((ch,j)=>{
        if(ch===' ') return;
        const x=startX+j*FS*0.6;
        const isGlitch=Math.random()>0.996;
        const dispCh=isGlitch?GLITCH[Math.floor(Math.random()*GLITCH.length)]:ch;
        const dist=Math.abs(j-line.length/2);
        const alpha=Math.max(0.3,1-dist*0.035);
        if(ch==='@'||ch==='='){ // 눈/입 강조
          ctx.save(); ctx.shadowColor='#00ff00'; ctx.shadowBlur=8;
          ctx.fillStyle=`rgba(0,255,80,${alpha})`;
          ctx.fillText(dispCh,x,y); ctx.restore();
        } else {
          ctx.fillStyle=`rgba(0,${Math.floor(175+Math.random()*35)},0,${alpha*0.85})`;
          ctx.fillText(dispCh,x,y);
        }
      });
    });
    const scanY=(tick*1.2)%(H+10)-5;
    const sg=ctx.createLinearGradient(0,scanY-5,0,scanY+5);
    sg.addColorStop(0,'rgba(0,255,0,0)'); sg.addColorStop(0.5,'rgba(0,255,0,0.2)'); sg.addColorStop(1,'rgba(0,255,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,scanY-5,W,10);
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center';
    ctx.fillText('ASCII-ID-004',W/2,H-4);
    tick++;
  }
  setInterval(draw,60);
})();


// ════════════════════════════════════
// ⑤ 글리치 — 상반신 픽셀맵
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c5'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;

  const MAP=[
    '0002222222220000',
    '0022111111220000',
    '0021351313520000', // eyes with highlight
    '0021351313520000', // eyes
    '0021111111120000',
    '0021181118112000', // nose
    '0021111111120000',
    '0021114444112000', // wider mouth
    '0021111111120000',
    '0002211122000000',
    '0000011110000000',
    '0006666666600000',
    '0660000000006600',
    '6600000000000660',
    '6600000000000660',
  ];
  const COLOR={'1':'#005500','2':'#001a00','3':'#000d00','4':'#00ff44','5':'#80ff80','6':'#003800','8':'#004400'};
  const PS=8;
  const offX=Math.floor((W-16*PS)/2);
  const offY=Math.floor((H-13*PS)/2);

  const base=document.createElement('canvas'); base.width=W; base.height=H;
  const bctx=base.getContext('2d');
  bctx.fillStyle='#000'; bctx.fillRect(0,0,W,H);
  MAP.forEach((row,ry)=>{
    [...row].forEach((cell,rx)=>{
      if(cell==='0') return;
      bctx.fillStyle=COLOR[cell]||'#004400';
      bctx.fillRect(offX+rx*PS, offY+ry*PS, PS-1, PS-1);
    });
  });

  function draw(){
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(base,0,0);
    const numSlices=Math.random()>0.72?Math.floor(Math.random()*5)+1:0;
    for(let i=0;i<numSlices;i++){
      const sy=Math.random()*H, sh=2+Math.random()*10, dx=(Math.random()-0.5)*28;
      const imgD=ctx.getImageData(0,sy,W,sh);
      ctx.putImageData(imgD,dx,sy);
    }
    if(Math.sin(tick*0.1)>0.6){
      ctx.save(); ctx.globalAlpha=0.14; ctx.globalCompositeOperation='screen';
      ctx.drawImage(base,-2,0); ctx.drawImage(base,2,0); ctx.restore();
    }
    if(Math.random()>0.88){
      const ny=Math.random()*H;
      ctx.fillStyle=`rgba(0,${Math.floor(Math.random()*255)},0,0.28)`;
      ctx.fillRect(0,ny,W,1+Math.random()*2);
    }
    if(Math.random()>0.92){
      for(let b=0;b<2;b++){
        const bx=Math.random()*W, by=Math.random()*H, bw=8+Math.random()*35, bh=2+Math.random()*6;
        const imgD=ctx.getImageData(bx,by,bw,bh);
        ctx.putImageData(imgD,bx+(Math.random()-0.5)*18,by);
      }
    }
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center';
    ctx.fillText('ERR-ID-005',W/2,H-4);
    tick++;
  }
  setInterval(draw,40);
})();


// ════════════════════════════════════
// ⑥ 실루엣 상반신 + 파티클
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c6'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;
  const cx=W/2;

  // 파티클 (얼굴 주변 궤도)
  const NP=60;
  const particles=Array.from({length:NP},()=>({
    r:38+Math.random()*45,
    a:Math.random()*Math.PI*2,
    spd:(Math.random()-0.5)*0.016,
    size:0.8+Math.random()*1.8,
    life:Math.random(),
  }));

  function drawBust(pulse){
    const headCx=cx, headCy=48;
    const s=pulse;

    ctx.save(); ctx.shadowColor='#00ff00'; ctx.shadowBlur=18*pulse;

    // 머리
    ctx.fillStyle='rgba(0,90,0,0.95)';
    ctx.beginPath(); ctx.ellipse(headCx,headCy,30*s,38*s,0,0,Math.PI*2); ctx.fill();

    // 목
    ctx.fillStyle='rgba(0,70,0,0.9)';
    ctx.beginPath(); ctx.ellipse(headCx,headCy+42*s,9*s,10*s,0,0,Math.PI*2); ctx.fill();

    // 어깨+가슴 (사다리꼴)
    ctx.fillStyle='rgba(0,65,0,0.92)';
    ctx.beginPath();
    ctx.moveTo(headCx-12*s, headCy+48*s); // 목 하단 왼
    ctx.lineTo(headCx+12*s, headCy+48*s); // 목 하단 우
    ctx.lineTo(headCx+72*s, H);            // 오른쪽 하단
    ctx.lineTo(headCx-72*s, H);            // 왼쪽 하단
    ctx.closePath(); ctx.fill();

    // 어깨선 글로우 테두리
    ctx.shadowBlur=12; ctx.strokeStyle='rgba(0,255,0,0.5)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(headCx-12*s, headCy+48*s);
    ctx.bezierCurveTo(headCx-35*s, headCy+50*s, headCx-58*s, headCy+62*s, headCx-72*s, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(headCx+12*s, headCy+48*s);
    ctx.bezierCurveTo(headCx+35*s, headCy+50*s, headCx+58*s, headCy+62*s, headCx+72*s, H);
    ctx.stroke();

    // 머리 글로우 테두리
    ctx.beginPath(); ctx.ellipse(headCx,headCy,30*s,38*s,0,0,Math.PI*2); ctx.stroke();

    // 눈
    ctx.shadowBlur=10; ctx.fillStyle='rgba(0,255,80,0.92)';
    ctx.beginPath(); ctx.ellipse(headCx-12*s,headCy-8*s,4*s,3.5*s,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(headCx+12*s,headCy-8*s,4*s,3.5*s,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(0,0,W,H);
    const pulse=0.9+Math.sin(tick*0.03)*0.1;
    const headCx=cx, headCy=48;

    // 파티클
    particles.forEach(p=>{
      p.a+=p.spd; p.life=(p.life+0.009)%1;
      const px=headCx+Math.cos(p.a)*p.r;
      const py=headCy+Math.sin(p.a)*p.r*0.55;
      const alpha=Math.sin(p.life*Math.PI)*0.75;
      ctx.save(); ctx.shadowColor='#00ff00'; ctx.shadowBlur=4;
      ctx.fillStyle=`rgba(0,255,80,${alpha})`;
      ctx.beginPath(); ctx.arc(px,py,p.size,0,Math.PI*2); ctx.fill(); ctx.restore();
    });

    drawBust(pulse);

    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center';
    ctx.fillText('SHDW-ID-006',W/2,H-4);
    tick++;
  }
  setInterval(draw,40);
})();


// ════════════════════════════════════
// ⑦ 매트릭스 — 얼굴+어깨 마스크
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c7'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;

  const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&';
  const CS=8, COLS=Math.floor(W/CS), ROWS=Math.floor(H/CS);

  // 얼굴+어깨 마스크 (landscape 비율)
  function inBust(col,row){
    const x=(col/COLS-0.5)*2;   // -1..1
    const y=(row/ROWS);          // 0..1
    // 머리 타원 (상단 40%)
    if(x*x/(0.52*0.52)+(( y-0.32)*(y-0.32))/(0.34*0.34)<1) return 'face';
    // 목
    if(Math.abs(x)<0.10 && y>0.63 && y<0.76) return 'body';
    // 어깨 (사다리꼴: y가 내려갈수록 더 넓게)
    const shoulderW=0.10+(y-0.72)*1.4;
    if(y>0.72 && y<1.0 && Math.abs(x)<shoulderW) return 'body';
    return null;
  }

  const cells=Array.from({length:ROWS},(_,r)=>
    Array.from({length:COLS},(_,c2)=>({
      ch:CHARS[Math.floor(Math.random()*CHARS.length)],
      timer:Math.random()*30,
      speed:2+Math.floor(Math.random()*4),
      bright:Math.random(),
    }))
  );
  const streams=Array.from({length:Math.floor(COLS/2)},()=>({
    col:Math.floor(Math.random()*COLS),
    head:Math.random()*ROWS,
    speed:0.2+Math.random()*0.4,
    len:4+Math.floor(Math.random()*8),
  }));

  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,0,W,H);
    ctx.font=`${CS-1}px 'Press Start 2P',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    streams.forEach(s=>{
      s.head+=s.speed;
      if(s.head>ROWS+s.len){s.head=0; s.col=Math.floor(Math.random()*COLS);}
    });
    cells.forEach((row,r)=>{
      row.forEach((cell,col)=>{
        cell.timer++;
        if(cell.timer>=cell.speed){ cell.ch=CHARS[Math.floor(Math.random()*CHARS.length)]; cell.timer=0; }
        const zone=inBust(col,r);
        const x=col*CS+CS/2, y=r*CS;
        let streamAlpha=0;
        streams.forEach(s=>{
          if(s.col===col){ const dist=Math.abs(r-s.head); if(dist<s.len) streamAlpha=Math.max(streamAlpha,1-dist/s.len); }
        });
        if(zone==='face'){
          ctx.fillStyle=streamAlpha>0.5?`rgba(200,255,200,${streamAlpha})`:`rgba(0,${150+Math.floor(cell.bright*80)},0,0.9)`;
        } else if(zone==='body'){
          ctx.fillStyle=`rgba(0,${80+Math.floor(cell.bright*55)},0,0.72)`;
        } else {
          ctx.fillStyle=streamAlpha>0.3?`rgba(0,${Math.floor(streamAlpha*180)},0,${streamAlpha*0.55})`:`rgba(0,${Math.floor(cell.bright*28)},0,${cell.bright*0.28})`;
        }
        ctx.fillText(cell.ch,x,y);
      });
    });
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace";
    ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('MTRX-ID-007',W/2,H-4);
    tick++;
  }
  setInterval(draw,50);
})();


// ════════════════════════════════════
// ⑧ 홀로그램 버스트
// ════════════════════════════════════
(function(){
  const c=document.getElementById('c8'),ctx=c.getContext('2d');
  const W=c.width,H=c.height; let tick=0;
  const cx=W/2, headCy=H*0.35;

  const off=document.createElement('canvas'); off.width=W; off.height=H;
  const octx=off.getContext('2d');

  const RINGS=[
    {r:22,speed:0.006,a:0,dots:10},
    {r:34,speed:-0.004,a:1,dots:14},
    {r:46,speed:0.005,a:2,dots:18},
    {r:60,speed:-0.003,a:0.5,dots:22},
  ];

  function draw(){
    octx.fillStyle='rgba(0,0,0,0.14)'; octx.fillRect(0,0,W,H);
    const pulse=0.85+Math.sin(tick*0.04)*0.15;

    // 홀로그램 링 (얼굴 주변)
    RINGS.forEach((ring,ri)=>{
      ring.a+=ring.speed;
      octx.save();
      octx.strokeStyle=`rgba(0,255,120,${0.08+ri*0.04})`;
      octx.lineWidth=0.8; octx.shadowColor='#00ff88'; octx.shadowBlur=3;
      octx.beginPath(); octx.ellipse(cx,headCy,ring.r*pulse,ring.r*pulse*0.5,0,0,Math.PI*2); octx.stroke();
      octx.restore();
      for(let d=0;d<ring.dots;d++){
        const da=(d/ring.dots)*Math.PI*2+ring.a;
        const px=cx+Math.cos(da)*ring.r*pulse;
        const py=headCy+Math.sin(da)*ring.r*pulse*0.5;
        const alpha=0.4+Math.sin(da*3+tick*0.05)*0.4;
        octx.save(); octx.shadowColor='#00ff00'; octx.shadowBlur=6;
        octx.fillStyle=`rgba(0,255,80,${alpha})`;
        octx.beginPath(); octx.arc(px,py,1.2,0,Math.PI*2); octx.fill(); octx.restore();
      }
    });

    // 얼굴 윤곽선
    const s=pulse;
    octx.save(); octx.strokeStyle='rgba(0,255,100,0.88)'; octx.lineWidth=1.8;
    octx.shadowColor='#00ff00'; octx.shadowBlur=10;
    // 얼굴 타원
    octx.beginPath(); octx.ellipse(cx,headCy,26*s,34*s,0,0,Math.PI*2); octx.stroke();
    // 눈
    [[cx-10*s,headCy-9*s],[cx+10*s,headCy-9*s]].forEach(([ex,ey])=>{
      octx.beginPath(); octx.ellipse(ex,ey,4*s,3*s,0,0,Math.PI*2); octx.stroke();
    });
    // 코
    octx.beginPath(); octx.moveTo(cx,headCy); octx.lineTo(cx-4*s,headCy+10*s); octx.lineTo(cx+4*s,headCy+10*s); octx.stroke();
    // 입
    octx.beginPath(); octx.arc(cx,headCy+19*s,9*s,0.2,Math.PI-0.2); octx.stroke();

    // 목
    const neckTop=headCy+34*s, neckBot=H*0.70;
    octx.beginPath(); octx.moveTo(cx-8*s,neckTop); octx.lineTo(cx-8*s,neckBot); octx.stroke();
    octx.beginPath(); octx.moveTo(cx+8*s,neckTop); octx.lineTo(cx+8*s,neckBot); octx.stroke();
    octx.beginPath(); octx.moveTo(cx-8*s,neckBot); octx.lineTo(cx+8*s,neckBot); octx.stroke();

    // 어깨선
    octx.beginPath();
    octx.moveTo(cx-8*s,neckBot);
    octx.bezierCurveTo(cx-28,neckBot+5, cx-60,H*0.82, cx-88,H*0.86);
    octx.stroke();
    octx.beginPath();
    octx.moveTo(cx+8*s,neckBot);
    octx.bezierCurveTo(cx+28,neckBot+5, cx+60,H*0.82, cx+88,H*0.86);
    octx.stroke();
    octx.restore();

    // 수직 스캔
    const scanX=(tick*1.8)%(W+20)-10;
    octx.save(); octx.globalAlpha=0.12;
    const sg=octx.createLinearGradient(scanX-8,0,scanX+8,0);
    sg.addColorStop(0,'rgba(0,255,0,0)'); sg.addColorStop(0.5,'rgba(0,255,0,1)'); sg.addColorStop(1,'rgba(0,255,0,0)');
    octx.fillStyle=sg; octx.fillRect(scanX-8,0,16,H); octx.restore();

    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(off,0,0);

    // 색수차
    ctx.save(); ctx.globalAlpha=0.05; ctx.globalCompositeOperation='screen';
    ctx.drawImage(off,-1,0); ctx.drawImage(off,1,0); ctx.restore();

    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let ly=0;ly<H;ly+=2) ctx.fillRect(0,ly,W,1);
    const bk=8; ctx.strokeStyle='rgba(0,255,0,0.6)'; ctx.lineWidth=1.5;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bk); ctx.stroke();
    });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle='rgba(0,255,0,0.5)'; ctx.textAlign='center';
    ctx.fillText('HOLO-ID-008',W/2,H-4);
    tick++;
  }
  setInterval(draw,30);
})();

},600);
</script>
